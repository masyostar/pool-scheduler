        '<p style="font-size:13px; color:var(--ink-soft); margin:0 0 14px;">You\'re trying to claim: <strong>'+shiftLabel+'</strong></p>' +
        '<div class="field"><label>Comment (optional)</label><textarea id="cr-comment" rows="3" placeholder="e.g. I can swap my other shift to a different day" style="width:100%; padding:8px 10px; border:1px solid var(--line); border-radius:7px; font-family:Inter,sans-serif; font-size:13px; resize:vertical;"></textarea></div>' +
        '<div class="modal-actions"><div></div>' +
        '<div class="right"><button class="cancel-btn" id="f-cancel">Cancel</button>' +
        '<button class="primary-btn" id="cr-send" style="background:var(--buoy);">Send request to operator</button></div></div></div>';
    } else if(m.type === 'droprequest'){
      var s = m.data.shift;
      var shiftLabel = new Date(s.date+'T00:00:00').toLocaleDateString(undefined,{weekday:'long', month:'short', day:'numeric'})+' '+s.start+'-'+s.end;
      wrap.innerHTML = '<div class="modal">' +
        '<h3>Request to drop shift</h3>' +
        '<p style="font-size:13px; color:var(--ink); margin:0 0 14px;">Your request to drop this shift will be sent to the operator for approval.</p>' +
        '<div style="background:var(--sand); border:1px solid var(--line); border-radius:8px; padding:10px; margin-bottom:14px;">' +
        '<div style="font-weight:600; font-size:13px;">'+shiftLabel+'</div>' +
        '<div style="font-size:11px; color:var(--ink-soft);">'+escapeHtml(s.role)+'</div></div>' +
        '<div class="field"><label>Reason (optional)</label><textarea id="dr-comment" rows="3" placeholder="e.g. I have a conflict that day" style="width:100%; padding:8px 10px; border:1px solid var(--line); border-radius:7px; font-family:Inter,sans-serif; font-size:13px; resize:vertical;"></textarea></div>' +
        '<div class="modal-actions"><div></div>' +
        '<div class="right"><button class="cancel-btn" id="f-cancel">Cancel</button>' +
        '<button class="primary-btn" id="dr-send">Send request</button></div></div></div>';
    } else if(m.type === 'profile'){
      var mins = totalHoursFor(state.identity.id);
      wrap.innerHTML = '<div class="modal">' +
        '<div class="modal-head"><h3 style="margin:0;">Profile</h3>' +
        '<button class="modal-x" id="f-cancel" aria-label="Close">&#10005;</button></div>' +
        '<div class="profile-section">' +
        '<div class="profile-row"><span class="prlabel">Name</span><span class="prvalue">'+escapeHtml(state.identity.name)+'</span></div>' +
        '<div class="profile-row"><span class="prlabel">Username</span><span class="prvalue">'+escapeHtml(state.identity.username)+'</span></div>' +
        '<div class="profile-row"><span class="prlabel">Role</span><span class="prvalue">'+ROLE_LABEL[state.identity.role]+'</span></div>' +
        '</div>' +
        '<div class="stat-card">' +
        '<div class="stat-num">'+fmtHours(mins)+'</div>' +
        '<div class="stat-label">Hours logged</div>' +
        '<div class="stat-fun">'+funHoursLine(mins)+'</div>' +
        '</div>' +
        '<div class="profile-section">' +
        '<h4>Change password</h4>' +
        '<div class="field"><label>Current password</label><input type="password" id="pw-current" autocomplete="current-password"></div>' +
        '<div class="field"><label>New password</label><input type="password" id="pw-new" autocomplete="new-password"></div>' +
        '<div class="field"><label>Confirm new password</label><input type="password" id="pw-confirm" autocomplete="new-password"></div>' +
        '<div id="pw-error" style="color:var(--buoy-text); font-size:12px; margin-bottom:8px; display:none;"></div>' +
        '<div id="pw-success" style="color:var(--green); font-size:12px; margin-bottom:8px; display:none;">Password updated.</div>' +
        '<button class="primary-btn" id="pw-save" style="width:100%;">Update password</button>' +
        '</div>' +
        '<div class="profile-section" style="margin-bottom:0;">' +
        '<button class="logout-btn" id="profile-logout">Log out</button>' +
        '</div></div>';
    }

    app.appendChild(wrap);
    wrap.addEventListener('click', function(e){ if(e.target.id==='modal-bg'){ state.modal=null; render(); } });
    var cancel = document.getElementById('f-cancel');
    if(cancel) cancel.onclick = function(){ state.modal=null; render(); };

    if(m.type === 'shift'){
      document.querySelectorAll('[data-select-worker]').forEach(function(el){
        el.onclick = function(e){
          e.stopPropagation();
          var wid = el.dataset.selectWorker || '';
          state.modal.data.workerId = wid;
          render();
        };
      });
      function refreshWorkerCards(){
        var date = document.getElementById('f-date').value;
        var start = document.getElementById('f-start').value;
        var end = document.getElementById('f-end').value;
        var role = document.getElementById('f-role').value;
        if(date) state.modal.data.date = date;
        if(start) state.modal.data.start = start;
        if(end) state.modal.data.end = end;
        if(role) state.modal.data.role = role;
        render();
      }
      var fDate = document.getElementById('f-date');
      var fStart = document.getElementById('f-start');
      var fEnd = document.getElementById('f-end');
      var fRole = document.getElementById('f-role');
      if(fDate) fDate.onchange = refreshWorkerCards;
      if(fStart) fStart.onchange = refreshWorkerCards;
      if(fEnd) fEnd.onchange = refreshWorkerCards;
      if(fRole) fRole.onchange = refreshWorkerCards;
    }

    var save = document.getElementById('f-save');
    if(save){
      save.onclick = async function(){
        var date = document.getElementById('f-date').value;
        var start = document.getElementById('f-start').value;
        var end = document.getElementById('f-end').value;
        var role = document.getElementById('f-role').value;
        var workerId = document.getElementById('f-worker').value || null;
        var note = document.getElementById('f-note').value.trim();
        if(!date || !start || !end){ showToast('Fill in date, start and end'); return; }
        if(workerId){
          var av = workerAvailForDate(workerId, date);
          var blocked = false;
          var reason = '';
          if(!av || !av.available){
            blocked = true;
            reason = 'has not marked themselves available for '+date;
          } else if(av.afterTime && start < av.afterTime){
            blocked = true;
            reason = 'is only available after '+av.afterTime+' (shift starts at '+start+')';
          } else if(av.beforeTime && end > av.beforeTime){
            blocked = true;
            reason = 'is only available before '+av.beforeTime+' (shift ends at '+end+')';
          }
          if(blocked){
            var w = state.workers.find(function(w){ return w.id===workerId; });
            if(!await showConfirm((w ? w.name : 'This worker')+' '+reason, 'Worker not available')) return;
          }
          var conflictShifts = state.shifts.filter(function(s){
            return s.workerId === workerId && s.date === date && s.id !== m.data.id && s.status !== 'trade';
          });
          if(conflictShifts.length > 0){
            var w = state.workers.find(function(w){ return w.id===workerId; });
            var cTimes = conflictShifts.map(function(c){ return c.start+'-'+c.end; }).join(', ');
            if(!await showConfirm((w ? w.name : 'This worker')+' already has a shift on '+date+' ('+cTimes+').', 'Schedule conflict')) return;
          }
        }
        if(m.data.id){
          await api('PUT','/api/shifts/'+m.data.id, {date:date, start:start, end:end, role:role, workerId:workerId, note:note, status: workerId ? 'assigned' : 'open'});
          var s = state.shifts.find(function(s){ return s.id===m.data.id; });
          Object.assign(s, {date:date, start:start, end:end, role:role, workerId:workerId, note:note, status: workerId ? 'assigned' : 'open'});
        } else {
          var newS = await api('POST','/api/shifts', {date:date, start:start, end:end, role:role, workerId:workerId, note:note});
          state.shifts.push(newS);
        }
        state.modal = null;
        render();
      };
    }
    var del = document.getElementById('f-delete');
    if(del){
      del.onclick = async function(){
        if(!await showConfirm('This will permanently remove this shift from the schedule.', 'Delete shift?')) return;
        await api('DELETE','/api/shifts/'+m.data.id);
        state.shifts = state.shifts.filter(function(s){ return s.id!==m.data.id; });
        state.modal = null;
        render();
      };
    }
    var wsave = document.getElementById('w-save');
    if(wsave){
      wsave.onclick = async function(){
        var name = document.getElementById('w-name').value.trim();
        var role = document.getElementById('w-role').value;
        if(!name){ showToast('Enter a name'); return; }
        var w = await api('POST','/api/workers',{name:name, role:role});
        state.workers.push(w);
        state.modal = null;
        render();
      };
    }
    var arsave = document.getElementById('ar-save');
    if(arsave){
      arsave.onclick = async function(){
        var fromDate = document.getElementById('ar-from').value;
        var toDate = document.getElementById('ar-to').value;
        if(!fromDate || !toDate){ showToast('Select both dates'); return; }
        if(fromDate > toDate){ showToast('Start date must be before end date'); return; }
        var req = await api('POST','/api/availability-requests',{fromDate:fromDate, toDate:toDate});
        state.availabilityRequests.push(req);
        state.modal = null;
        showToast('Availability request sent');
        render();
      };
    }
    var crSend = document.getElementById('cr-send');
    if(crSend){
      crSend.onclick = async function(){
        var comment = document.getElementById('cr-comment').value.trim();
        var s = m.data.shift;
        var shiftLabel = new Date(s.date+'T00:00:00').toLocaleDateString(undefined,{weekday:'long', month:'short', day:'numeric'})+' '+s.start+'-'+s.end;
        var msg = 'Send a request to the operator to claim this shift?\n\nShift: '+shiftLabel;
        if(comment) msg += '\nComment: '+comment;
        if(!await showConfirm(msg, 'Confirm request')) return;
        var req = await api('POST','/api/shift-requests',{shiftId:s.id, workerId:state.identity.id, workerName:state.identity.name, shiftDate:s.date, shiftTime:s.start+'-'+s.end, comment:comment});
        state.shiftRequests.push(req);
        state.modal = null;
        showToast('Request sent to operator'); render();
      };
    }
    var drSend = document.getElementById('dr-send');
    if(drSend){
      drSend.onclick = async function(){
        var comment = document.getElementById('dr-comment').value.trim();
        var s = m.data.shift;
        var shiftLabel = new Date(s.date+'T00:00:00').toLocaleDateString(undefined,{weekday:'long', month:'short', day:'numeric'})+' '+s.start+'-'+s.end;
        var msg = 'Send a request to the operator to drop this shift?\n\nShift: '+shiftLabel;
        if(comment) msg += '\nReason: '+comment;
        if(!await showConfirm(msg, 'Confirm drop request')) return;
        var req = await api('POST','/api/shift-requests',{shiftId:s.id, workerId:state.identity.id, workerName:state.identity.name, shiftDate:s.date, shiftTime:s.start+'-'+s.end, type:'drop', comment:comment});
        state.shiftRequests.push(req);
        state.modal = null;
        showToast('Drop request sent to operator'); render();
      };
    }
    var pwSave = document.getElementById('pw-save');
    if(pwSave){
      pwSave.onclick = async function(){
        var current = document.getElementById('pw-current').value;
        var next = document.getElementById('pw-new').value;
        var confirmPw = document.getElementById('pw-confirm').value;
        var errEl = document.getElementById('pw-error');
        var okEl = document.getElementById('pw-success');
        errEl.style.display = 'none'; okEl.style.display = 'none';
        if(!current || !next || !confirmPw){ errEl.textContent = 'Fill in all fields'; errEl.style.display = 'block'; return; }
        if(next !== confirmPw){ errEl.textContent = 'New passwords do not match'; errEl.style.display = 'block'; return; }
        var result = await api('PUT','/api/users/'+state.identity.id+'/password', {currentPassword:current, newPassword:next});
        if(!result || result.error){ errEl.textContent = (result && result.error) || 'Something went wrong'; errEl.style.display = 'block'; return; }
        document.getElementById('pw-current').value = '';
        document.getElementById('pw-new').value = '';
        document.getElementById('pw-confirm').value = '';
        okEl.style.display = 'block';
      };
    }
    var profileLogout = document.getElementById('profile-logout');
    if(profileLogout){
      profileLogout.onclick = async function(){
        state.identity = null; state.authMode = 'login'; state.modal = null;
        await removePersonal('pool_identity');
        render();
      };
    }
  }

  // ================= EVENT BINDING =================
  function bindApp(){
    var openProfile = document.getElementById('open-profile');
    if(openProfile) openProfile.onclick = function(){ state.modal = {type:'profile', data:{}}; render(); };
    document.querySelectorAll('[data-dismiss-trade]').forEach(function(el){
      el.onclick = async function(){
        state.dismissedTrades.push(el.dataset.dismissTrade);
        await setPersonal('pool_dismissed_trades', state.dismissedTrades);
        render();
      };
    });

    document.querySelectorAll('[data-tab]').forEach(function(el){
      el.onclick = function(){
        state.tab = el.dataset.tab;
        if(state.tab === 'availability' && !isOperator()) markAvailSeen();
        render();
      };
    });

    var notifBell = document.getElementById('notif-bell');
    if(notifBell) notifBell.onclick = function(){ state.tab = 'availability'; markAvailSeen(); render(); };

    var prev = document.getElementById('wk-prev');
    if(prev) prev.onclick = function(){ var d=new Date(state.weekStart); d.setDate(d.getDate()-7); state.weekStart=d; render(); };
    var next = document.getElementById('wk-next');
    if(next) next.onclick = function(){ var d=new Date(state.weekStart); d.setDate(d.getDate()+7); state.weekStart=d; render(); };
    var todayBtn = document.getElementById('wk-today');
    if(todayBtn) todayBtn.onclick = function(){ state.weekStart = startOfWeek(new Date()); render(); };

    var addGeneric = document.getElementById('add-shift-generic');
    if(addGeneric) addGeneric.onclick = function(){ state.modal = {type:'shift', data:{date: fmtISO(state.weekStart)}}; render(); };

    document.querySelectorAll('[data-add-day]').forEach(function(el){
      el.onclick = function(){ state.modal = {type:'shift', data:{date: el.dataset.addDay}}; render(); };
    });
    document.querySelectorAll('[data-edit]').forEach(function(el){
      el.onclick = function(){ var s = state.shifts.find(function(s){ return s.id===el.dataset.edit; }); state.modal = {type:'shift', data:{}}; Object.assign(state.modal.data, s); render(); };
    });
    document.querySelectorAll('[data-trade]').forEach(function(el){
      el.onclick = async function(){
        await api('PUT','/api/shifts/'+el.dataset.trade, {status:'trade'});
        var s=state.shifts.find(function(s){ return s.id===el.dataset.trade; }); s.status='trade';
        showToast('Put up for trade'); render();
      };
    });
    document.querySelectorAll('[data-untrade]').forEach(function(el){
      el.onclick = async function(){
        await api('PUT','/api/shifts/'+el.dataset.untrade, {status:'assigned'});
        var s=state.shifts.find(function(s){ return s.id===el.dataset.untrade; }); s.status='assigned';
        showToast('Trade cancelled'); render();
      };
    });
    document.querySelectorAll('[data-drop]').forEach(function(el){
      el.onclick = async function(){
        var shiftId = el.dataset.drop;
        var s = state.shifts.find(function(s){ return s.id===shiftId; });
        if(!s) return;
        var existingReq = state.shiftRequests.find(function(r){ return r.shiftId===shiftId && r.status==='pending'; });
        if(existingReq){ showToast('Drop request already pending'); return; }
        state.modal = {type:'droprequest', data:{shiftId:shiftId, shift:s}};
        render();
      };
    });
    document.querySelectorAll('[data-approve-req]').forEach(function(el){
      el.onclick = async function(){
        var reqId = el.dataset.approveReq;
        var req = state.shiftRequests.find(function(r){ return r.id===reqId; });
        if(!req) return;
        if(req.type === 'drop'){
          await api('PUT','/api/shifts/'+req.shiftId, {status:'open', workerId:null});
          var s = state.shifts.find(function(s){ return s.id===req.shiftId; });
          if(s){ s.status='open'; s.workerId=null; }
          await api('PUT','/api/shift-requests/'+reqId, {status:'approved'});
          req.status='approved';
          showToast('Drop approved for '+req.workerName); render();
        } else {
          await api('PUT','/api/shifts/'+req.shiftId, {status:'assigned', workerId:req.workerId});
          var s = state.shifts.find(function(s){ return s.id===req.shiftId; });
          if(s){ s.status='assigned'; s.workerId=req.workerId; }
          await api('PUT','/api/shift-requests/'+reqId, {status:'approved'});
          req.status='approved';
          showToast('Shift assigned to '+req.workerName); render();
        }
      };
    });
    document.querySelectorAll('[data-deny-req]').forEach(function(el){
      el.onclick = async function(){
        var reqId = el.dataset.denyReq;
        if(!await showConfirm('Deny this shift request?', 'Deny request')) return;
        await api('PUT','/api/shift-requests/'+reqId, {status:'denied'});
        var req = state.shiftRequests.find(function(r){ return r.id===reqId; });
        if(req) req.status='denied';
        showToast('Request denied'); render();
      };
    });
    document.querySelectorAll('[data-claim]').forEach(function(el){
      el.onclick = async function(){
        var shiftId = el.dataset.claim;
        var shift = state.shifts.find(function(s){ return s.id===shiftId; });
        if(!shift) return;
        var myConflicts = state.shifts.filter(function(s){
          return s.workerId === state.identity.id && s.date === shift.date && s.id !== shift.id && s.status !== 'trade';
        });
        if(myConflicts.length > 0){
          var cTimes = myConflicts.map(function(c){ return c.start+'-'+c.end; }).join(', ');
          state.modal = {type:'claimrequest', data:{shiftId:shiftId, shift:shift, conflictTimes:cTimes}};
          render();
          return;
        }
        await api('PUT','/api/shifts/'+shiftId, {status:'assigned', workerId:state.identity.id});
        var s=state.shifts.find(function(s){ return s.id===shiftId; });
        s.status='assigned'; s.workerId = state.identity.id;
        showToast('Shift claimed \u2014 it is yours now'); render();
      };
    });
    document.querySelectorAll('[data-role-for]').forEach(function(el){
      el.onchange = async function(){
        var w = state.workers.find(function(w){ return w.id===el.dataset.roleFor; });
        await api('PUT','/api/workers/'+w.id, {role:el.value});
        w.role = el.value;
        if(state.identity && state.identity.id===w.id) { state.identity.role = w.role; await setPersonal('pool_identity', state.identity); }
        showToast('Role updated'); render();
      };
    });
    document.querySelectorAll('[data-remove-worker]').forEach(function(el){
      el.onclick = async function(){
        if(!await showConfirm('Their upcoming shifts will become unfilled and open for others.', 'Remove worker?')) return;
        await api('DELETE','/api/workers/'+el.dataset.removeWorker);
        state.shifts.forEach(function(s){ if(s.workerId===el.dataset.removeWorker){ s.workerId=null; s.status='open'; } });
        state.workers = state.workers.filter(function(w){ return w.id!==el.dataset.removeWorker; });
        render();
      };
    });
    var addWorker = document.getElementById('add-worker');
    if(addWorker) addWorker.onclick = function(){ state.modal = {type:'addworker', data:{}}; render(); };
    document.querySelectorAll('[data-confirm-user]').forEach(function(el){
      el.onclick = async function(){
        var uid = el.dataset.confirmUser;
        var roleSel = document.querySelector('[data-approve-role="'+uid+'"]');
        var role = roleSel ? roleSel.value : 'lifeguard';
        await api('PUT','/api/users/'+uid+'/role', {role:role});
        await api('PUT','/api/users/'+uid+'/confirm');
        state.users.forEach(function(u){ if(u.id===uid){ u.confirmed = true; u.role = role; } });
        state.workers.forEach(function(w){ if(w.id===uid) w.role = role; });
        showToast('Account approved as '+ROLE_LABEL[role]);
        render();
      };
    });
    document.querySelectorAll('[data-deny-user]').forEach(function(el){
      el.onclick = async function(){
        if(!await showConfirm('This account will be permanently deleted. They can register again.', 'Deny account?')) return;
        await api('DELETE','/api/users/'+el.dataset.denyUser);
        state.users = state.users.filter(function(u){ return u.id!==el.dataset.denyUser; });
        state.workers = state.workers.filter(function(w){ return w.id!==el.dataset.denyUser; });
        showToast('Account denied');
        render();
      };
    });
    var newAvailReq = document.getElementById('new-avail-request');
    if(newAvailReq) newAvailReq.onclick = function(){ state.modal = {type:'availrequest', data:{}}; render(); };
    var fillAvail = document.getElementById('fill-availability');
    if(fillAvail) fillAvail.onclick = function(){ state.tab = 'availability'; render(); };
    document.querySelectorAll('[data-delete-req]').forEach(function(el){
      el.onclick = async function(){
        if(!await showConfirm('Workers will no longer see this request.', 'Delete request?')) return;
        await api('DELETE','/api/availability-requests/'+el.dataset.deleteReq);
        state.availabilityRequests = state.availabilityRequests.filter(function(r){ return r.id!==el.dataset.deleteReq; });
        render();
      };
    });
    document.querySelectorAll('[data-avail-direct]').forEach(function(el){
      el.onclick = async function(){
        var date = el.dataset.availDirect;
        var val = el.dataset.availVal;
        var existing = myAvailForDate(date);
        if(val === 'clear'){
          if(existing){
            await api('DELETE','/api/availability/'+existing.id);
            state.availability = state.availability.filter(function(a){ return a.id!==existing.id; });
          }
        } else if(val === 'available'){
          if(existing){
            if(!existing.available){
              await api('PUT','/api/availability/'+existing.id, {available:true, afterTime:'', beforeTime:''});
              existing.available = true; existing.afterTime = ''; existing.beforeTime = '';
            }
          } else {
            var newAv = await api('POST','/api/availability',{workerId:state.identity.id, date:date, available:true});
            state.availability.push(newAv);
          }
        } else if(val === 'unavailable'){
          if(existing){
            if(existing.available){
              await api('PUT','/api/availability/'+existing.id, {available:false, afterTime:'', beforeTime:''});
              existing.available = false; existing.afterTime = ''; existing.beforeTime = '';
            }
          } else {
            var newAv = await api('POST','/api/availability',{workerId:state.identity.id, date:date, available:false});
            state.availability.push(newAv);
          }
        }
        render();
      };
    });
    document.querySelectorAll('[data-avail-set]').forEach(function(el){
      el.onclick = async function(e){
        e.stopPropagation();
        var date = el.dataset.availSet;
        var type = el.dataset.availType;
        var existing = myAvailForDate(date);
        if(!existing || !existing.available) return;
        var payload = {available:true};
        if(type === 'allday'){
          payload.afterTime = '';
          payload.beforeTime = '';
        } else if(type === 'after'){
          var timeInput = el.querySelector('.avail-time-input') || el;
          payload.afterTime = timeInput.value || '09:00';
          payload.beforeTime = '';
        } else if(type === 'before'){
          var timeInput = el.querySelector('.avail-time-input') || el;
          payload.beforeTime = timeInput.value || '17:00';
          payload.afterTime = '';
        }
        await api('PUT','/api/availability/'+existing.id, payload);
        existing.afterTime = payload.afterTime;
        existing.beforeTime = payload.beforeTime;
        render();
      };
    });
    document.querySelectorAll('.avail-time-input').forEach(function(inp){
      inp.onclick = function(e){ e.stopPropagation(); };
      inp.onchange = async function(e){
        e.stopPropagation();
        var date = inp.dataset.availSet;
        var type = inp.dataset.availType;
        var existing = myAvailForDate(date);
        if(!existing || !existing.available) return;
        var payload = {available:true};
        if(type === 'after'){
          payload.afterTime = inp.value || '09:00';
          payload.beforeTime = '';
        } else if(type === 'before'){
          payload.beforeTime = inp.value || '17:00';
          payload.afterTime = '';
        }
        await api('PUT','/api/availability/'+existing.id, payload);
        existing.afterTime = payload.afterTime;
        existing.beforeTime = payload.beforeTime;
        render();
      };
    });
    var resetAll = document.getElementById('reset-all');
    if(resetAll) resetAll.onclick = async function(){
      if(!await showConfirm('This will permanently delete ALL workers, shifts, and availability data.', 'Reset everything?')) return;
      await api('POST','/api/reset');
      state.workers = [];
      state.shifts = [];
      state.identity = null;
      state.authMode = 'setup';
      await removePersonal('pool_identity');
      showToast('All data cleared');
      render();
    };
  }

  loadAll();
})();
</script>
</body>
</html>
