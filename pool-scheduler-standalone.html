<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Springhaven Club — Shift Board (Offline)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --deep:#141B36;
    --water:#4453F4;
    --water-light:#EAEBFD;
    --sand:#F1F2F5;
    --card:#FFFFFF;
    --card-soft:#F6F7F9;
    --ink:#141B36;
    --ink-soft:#82868F;
    --ink-faint:#B7BBC3;
    --buoy:#E5484D;
    --buoy-text:#C22A2F;
    --buoy-soft:#FBE7E8;
    --amber:#D98324;
    --amber-text:#9A5B12;
    --amber-soft:#FBEEDD;
    --green:#1FA463;
    --green-soft:#E3F6EC;
    --line:rgba(21,23,28,0.08);
    --shadow-sm:0 1px 2px rgba(21,23,28,0.05);
    --shadow-md:0 16px 40px rgba(21,23,28,0.14);
    --radius:18px;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--sand);
    color:var(--ink);
    font-family:'Inter',sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  #app{min-height:100vh; padding-bottom:60px;}
  h1,h2,h3{
    font-family:'Inter',sans-serif;
    font-weight:800;
    letter-spacing:-0.02em;
  }
  .mono{font-variant-numeric:tabular-nums;}
  button{font-family:inherit; cursor:pointer;}
  a{color:inherit;}

  .topbar{
    background:var(--sand);
    color:var(--ink);
    padding:28px 24px 14px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    position:relative;
  }
  .brand{display:flex; align-items:center; gap:12px;}
  .brand .ring{
    width:34px; height:34px; border-radius:10px;
    background:var(--deep);
    flex:none;
    position:relative;
  }
  .brand .ring::after{
    content:"";
    position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
    width:12px; height:12px; border-radius:50%;
    background:#fff;
  }
  .brand-text .t1{font-size:20px; font-weight:800; line-height:1.15; font-family:'Inter',sans-serif; letter-spacing:-0.01em; color:var(--ink);}
  .brand-text .t2{font-size:12px; color:var(--ink-soft); letter-spacing:0.02em; margin-top:3px;}
  .whoami{display:flex; align-items:center; gap:10px; font-size:13px; color:var(--ink-soft);}
  .badge{
    padding:4px 10px;
    border-radius:20px;
    font-size:11px;
    font-weight:700;
    text-transform:uppercase;
    letter-spacing:0.03em;
  }
  .badge.operator{background:var(--buoy-soft); color:var(--buoy-text);}
  .badge.manager{background:var(--water-light); color:var(--water);}
  .badge.lifeguard{background:var(--card-soft); color:var(--ink-soft); border:1px solid var(--line);}
  .badge.gateperson{background:var(--amber-soft); color:var(--amber-text);}
  .link-btn{
    background:none; border:none; color:var(--ink-soft); text-decoration:underline;
    font-size:12px; padding:0;
  }
  .link-btn:hover{color:var(--ink);}
  .profile-btn{
    background:var(--card); border:1px solid var(--line); color:var(--ink);
    border-radius:20px; padding:6px 14px; font-size:12.5px; font-weight:600;
  }
  .profile-btn:hover{background:var(--card-soft);}

  .tabs{
    display:flex; gap:6px; flex-wrap:wrap;
    padding:6px 24px 16px;
    max-width:1100px; margin:0 auto;
  }
  .tab{
    background:transparent; border:none;
    padding:9px 16px;
    font-family:'Inter',sans-serif;
    font-size:13.5px; font-weight:600;
    color:var(--ink-soft);
    border-radius:999px;
    transition:background .15s ease, color .15s ease;
  }
  .tab:hover{background:var(--card-soft); color:var(--ink);}
  .tab.active{color:#fff; background:var(--deep);}

  .content{max-width:1100px; margin:0 auto; padding:18px 24px 40px;}

  .weeknav{
    display:flex; align-items:center; justify-content:space-between;
    margin-bottom:16px; flex-wrap:wrap; gap:10px;
  }
  .weeknav .range{font-size:16px; font-weight:700; color:var(--ink); letter-spacing:-0.01em;}
  .weeknav button{
    background:var(--card); border:1px solid var(--line); border-radius:10px;
    padding:7px 14px; font-size:13px; color:var(--ink); font-weight:600;
  }
  .weeknav button:hover{background:var(--card-soft);}
  .nav-btns{display:flex; gap:8px; align-items:center;}

  .addshift-btn, .primary-btn{
    background:var(--deep); color:#fff; border:none; border-radius:10px;
    padding:9px 16px; font-size:13.5px; font-weight:600;
    transition:background .15s ease;
  }
  .addshift-btn:hover, .primary-btn:hover{background:#0B0F22;}

  .weekgrid{
    display:grid;
    grid-template-columns:repeat(7,1fr);
    gap:10px;
  }
  .daycol{
    background:var(--card);
    border-radius:var(--radius);
    min-width:150px;
    padding:10px;
    border:1px solid var(--line);
    box-shadow:var(--shadow-sm);
  }
  .daycol.today{outline:2px solid var(--water);}
  .daycol .dhead{
    text-align:center; padding:4px 0 8px;
    border-bottom:1px solid var(--line);
    margin-bottom:8px;
  }
  .daycol .dname{font-size:11px; font-weight:700; color:var(--ink-soft); text-transform:uppercase; letter-spacing:0.05em;}
  .daycol .dnum{font-family:'Inter',sans-serif; font-size:20px; font-weight:800; color:var(--ink);}

  .shiftcard{
    background:var(--card);
    border-radius:14px;
    padding:10px 11px;
    margin-bottom:8px;
    border:1px solid var(--line);
    box-shadow:var(--shadow-sm);
  }
  .shiftcard.status-trade{background:var(--amber-soft); border-color:transparent;}
  .shiftcard.status-open{background:var(--buoy-soft); border:1px dashed var(--buoy);}
  .shiftcard .time{font-family:'Inter',sans-serif; font-size:12.5px; font-weight:700; color:var(--ink); font-variant-numeric:tabular-nums;}
  .shiftcard .role{font-size:10.5px; text-transform:uppercase; letter-spacing:0.03em; color:var(--ink-soft); margin-top:2px; font-weight:600;}
  .shiftcard .who{font-size:13.5px; font-weight:700; margin-top:5px; color:var(--ink);}
  .shiftcard .who.unfilled{color:var(--buoy-text);}
  .shiftcard .status-tag{
    display:block; font-size:10px; font-weight:700; text-transform:uppercase;
    margin-top:5px; letter-spacing:0.02em;
  }
  .status-tag.trade{color:var(--amber-text);}
  .status-tag.open{color:var(--buoy-text);}
  .shiftcard .note{font-size:11px; color:var(--ink-soft); margin-top:4px; font-style:normal;}
  .shiftcard .actions{display:flex; flex-wrap:wrap; gap:6px; margin-top:8px;}
  .shiftcard .actions button{
    font-size:11px; border:1px solid var(--line); background:var(--card);
    border-radius:8px; padding:4px 9px; font-weight:600; color:var(--ink);
  }
  .shiftcard .actions button.claim{background:var(--green); color:#fff; border-color:var(--green);}
  .shiftcard .actions button.drop{background:#fff; color:var(--buoy-text); border-color:var(--buoy-soft);}
  .shiftcard .actions button.trade-btn{background:#fff; color:var(--amber-text); border-color:var(--amber-soft);}
  .shiftcard .actions button.edit{background:#fff;}
  .shiftcard .actions button.del{color:var(--buoy-text); border-color:var(--buoy-soft);}
  .daycol .addcell{
    width:100%; background:none; border:1px dashed var(--line); border-radius:10px;
    padding:7px; font-size:11.5px; color:var(--ink-soft); font-weight:600; margin-top:4px;
  }
  .daycol .addcell:hover{background:var(--card-soft); color:var(--ink); border-color:var(--ink-faint);}
  .daycol .empty{font-size:11.5px; color:var(--ink-faint); text-align:center; padding:12px 0;}

  .board-item{
    background:var(--card); border-radius:14px; padding:12px 14px;
    display:flex; align-items:center; justify-content:space-between; gap:10px;
    margin-bottom:8px; border:1px solid var(--line); box-shadow:var(--shadow-sm);
  }
  .board-item.trade{background:var(--amber-soft); border-color:transparent;}
  .board-item.open{background:var(--buoy-soft); border-color:transparent;}
  .board-item .left .d1{font-weight:700; font-size:13.5px; color:var(--ink);}
  .board-item .left .d2{font-size:12px; color:var(--ink-soft); font-family:'Inter',sans-serif; font-variant-numeric:tabular-nums;}
  .board-item .left .d3{font-size:11.5px; margin-top:3px; color:var(--ink-soft);}

  .empty-state{
    text-align:center; padding:50px 20px; color:var(--ink-soft);
  }
  .empty-state .ring{
    width:44px; height:44px; border-radius:50%; border:5px solid var(--water-light);
    margin:0 auto 14px; box-shadow:inset 0 0 0 3px var(--sand); position:relative;
  }
  .empty-state .ring::after{
    content:""; position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
    width:18px; height:3px; background:var(--water-light); border-radius:2px;
  }

  .roster-row{
    display:flex; align-items:center; justify-content:space-between;
    background:var(--card); border:1px solid var(--line); border-radius:14px;
    padding:11px 14px; margin-bottom:8px; flex-wrap:wrap; gap:8px;
    box-shadow:var(--shadow-sm);
  }
  .roster-row select{
    font-family:'Inter',sans-serif; font-size:12px; padding:5px 8px; border-radius:8px; border:1px solid var(--line); background:var(--card);
  }
  .roster-row .rname{font-weight:700; font-size:14px; color:var(--ink);}
  .roster-row .rm-btn{background:none; border:none; color:var(--buoy-text); font-size:12px; text-decoration:underline;}

  .modal-bg{
    position:fixed; inset:0; background:rgba(15,17,20,0.5);
    display:flex; align-items:center; justify-content:center; padding:16px; z-index:50;
  }
  .modal{
    background:var(--card); border-radius:20px; padding:24px; width:100%; max-width:420px;
    max-height:90vh; overflow-y:auto; box-shadow:var(--shadow-md);
    scrollbar-width:none; -ms-overflow-style:none;
  }
  .modal::-webkit-scrollbar{display:none;}
  .modal-head{display:flex; align-items:center; justify-content:space-between; margin-bottom:16px;}
  .modal-x{
    background:var(--card-soft); border:none; color:var(--ink-soft);
    width:30px; height:30px; border-radius:50%; font-size:14px; line-height:1;
    display:flex; align-items:center; justify-content:center; flex:none;
  }
  .modal-x:hover{background:var(--line); color:var(--ink);}
  .modal h3{margin:0 0 16px; font-size:19px; color:var(--ink);}
  .field{margin-bottom:14px;}
  .field label{display:block; font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:0.03em; color:var(--ink-soft); margin-bottom:5px;}
  .field input, .field select, .field textarea{
    width:100%; padding:9px 11px; border:1px solid var(--line); border-radius:10px;
    font-family:'Inter',sans-serif; font-size:14px; background:var(--card-soft); color:var(--ink);
  }
  .field input:focus, .field select:focus, .field textarea:focus{outline:none; border-color:var(--water); background:var(--card);}
  .field.row2{display:flex; gap:10px;}
  .field.row2 > div{flex:1;}
  .modal-actions{display:flex; justify-content:space-between; align-items:center; margin-top:16px; flex-wrap:wrap; gap:8px;}
  .modal-actions .right{display:flex; gap:8px;}
  .cancel-btn{background:none; border:none; color:var(--ink-soft); font-size:13px; font-weight:600;}
  .cancel-btn:hover{color:var(--ink);}
  .del-link{background:none; border:none; color:var(--buoy-text); font-size:12px; text-decoration:underline;}
  .avail-opt{background:var(--card-soft); border:1px solid var(--line); border-radius:8px; padding:4px 10px; font-size:11px; font-weight:600; color:var(--ink-soft); cursor:pointer; display:inline-flex; align-items:center; gap:4px;}
  .avail-opt.active-opt{background:var(--green); color:#fff; border-color:var(--green);}
  .avail-time-input{border:none; background:transparent; font-size:11px; font-weight:600; color:inherit; width:70px; padding:0; cursor:pointer;}
  .avail-opt.active-opt .avail-time-input{color:#fff;}
  .avail-opt.active-opt-unavail{background:var(--buoy); color:#fff; border-color:var(--buoy);}
  .worker-card:hover:not(.selected){border-color:var(--deep) !important; background:var(--card-soft) !important;}
  #f-worker-list{max-height:260px; overflow-y:auto; -webkit-overflow-scrolling:touch; padding-right:4px; scrollbar-width:none; -ms-overflow-style:none;}
  #f-worker-list::-webkit-scrollbar{display:none;}
  .worker-card .wk-info{display:flex; justify-content:space-between; align-items:center; gap:6px; flex-wrap:wrap;}

  input[type="time"]::-webkit-inner-spin-button,
  input[type="time"]::-webkit-outer-spin-button{-webkit-appearance:none; margin:0;}
  input[type="time"]{-moz-appearance:textfield;}
  input[type="date"]::-webkit-calendar-picker-indicator{opacity:0.5; cursor:pointer;}

  .trade-notif{background:var(--amber-soft); color:var(--amber-text); padding:11px 14px; border-radius:12px; margin-bottom:10px; display:flex; justify-content:space-between; align-items:center; gap:10px; font-size:13px; font-weight:600;}
  .trade-notif .dismiss{background:none; border:none; color:var(--amber-text); font-size:18px; cursor:pointer; padding:0 4px; opacity:0.6; flex-shrink:0;}
  .trade-notif .dismiss:hover{opacity:1;}

  .pending-account{border:1px solid var(--line); border-radius:14px; padding:14px 16px; margin-bottom:10px; background:var(--card-soft);}
  .pending-account.manager-pending{border-left:3px solid var(--amber); background:var(--amber-soft);}
  .pending-account .pa-header{display:flex; justify-content:space-between; align-items:center; gap:8px;}
  .pending-account .pa-name{font-weight:700; font-size:14px; color:var(--ink);}
  .pending-account .pa-role{font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:0.03em; padding:3px 8px; border-radius:20px; background:var(--card); border:1px solid var(--line); color:var(--ink-soft);}
  .pending-account .pa-role.manager{background:var(--amber-soft); color:var(--amber-text); border-color:transparent;}
  .pending-account .pa-actions{display:flex; gap:8px; margin-top:8px;}
  .approve-btn{background:var(--green); color:#fff; border:none; padding:10px 20px; border-radius:10px; font-size:14px; font-weight:700; cursor:pointer;}
  .approve-btn:hover{opacity:0.85;}
  .deny-btn{background:var(--card); color:var(--buoy-text); border:1px solid var(--buoy-soft); padding:10px 20px; border-radius:10px; font-size:14px; font-weight:700; cursor:pointer;}
  .deny-btn:hover{background:var(--buoy-soft);}

  @media (max-width:480px){
    .modal{padding:16px; max-height:85vh;}
    .modal h3{font-size:16px;}
    .field.row2{flex-direction:column; gap:0;}
    .field.row2 > div{flex:1;}
    .field input[type="date"],
    .field input[type="time"]{padding:6px 8px; font-size:13px;}
    .modal-actions{flex-direction:column-reverse; align-items:stretch;}
    .modal-actions .right{justify-content:flex-end;}
    .modal-actions .del-link{text-align:center;}
    #f-worker-list{max-height:200px;}
    .brand-text .t1{font-size:16px;}
    .brand .ring{width:26px; height:26px;}
  }

  .onboard-wrap{
    max-width:420px; margin:60px auto; padding:0 20px;
  }
  .onboard-card{
    background:var(--card); border-radius:20px; padding:32px; box-shadow:var(--shadow-md);
  }
  .onboard-card h2{margin-top:0; color:var(--ink); font-size:23px;}
  .onboard-card p{font-size:13.5px; color:var(--ink-soft); line-height:1.6;}
  .roster-pick{
    display:flex; align-items:center; justify-content:space-between;
    padding:10px 12px; border:1px solid var(--line); border-radius:10px; margin-bottom:8px; background:var(--card-soft);
  }
  .roster-pick button{background:var(--deep); color:#fff; border:none; border-radius:8px; padding:6px 12px; font-size:12px; font-weight:600;}
  .divider-or{text-align:center; font-size:11px; color:var(--ink-faint); margin:18px 0; text-transform:uppercase; letter-spacing:0.08em;}

  .toast{
    position:fixed; bottom:18px; left:50%; transform:translateX(-50%);
    background:var(--deep); color:#fff; padding:10px 20px; border-radius:999px;
    font-size:13px; font-weight:600; box-shadow:var(--shadow-md); z-index:60;
  }

  .notif-badge{
    position:absolute; top:-6px; right:-6px;
    background:var(--card); color:var(--buoy-text); font-size:10px; font-weight:800;
    width:18px; height:18px; border-radius:50%; display:flex; align-items:center; justify-content:center;
    border:2px solid var(--buoy); line-height:1;
  }
  .tab-badge{
    display:inline-flex; align-items:center; justify-content:center;
    background:var(--buoy); color:#fff; font-size:10px; font-weight:700;
    min-width:16px; height:16px; border-radius:8px; padding:0 4px; margin-left:4px; vertical-align:middle;
  }
  .notif-bell{
    position:relative; background:none; border:none; color:var(--ink-soft);
    padding:4px; cursor:pointer; line-height:1; display:inline-flex; align-items:center;
  }
  .notif-bell.has-new{ color:var(--amber); }
  .notif-bell svg{width:17px; height:17px; display:block;}

  .pending-panel{
    margin-bottom:20px; padding:16px;
    background:var(--amber-soft); border:1px solid var(--amber); border-radius:var(--radius);
  }
  .pending-panel .pp-head{display:flex; align-items:center; gap:8px; margin-bottom:10px; color:var(--ink);}
  .pending-panel .pp-head svg{width:18px; height:18px; flex:none;}
  .pending-panel .pp-title{font-weight:700; font-size:15px;}
  .pending-panel .pp-sub{margin:0 0 14px; font-size:13px; color:var(--ink-soft);}
  .pa-user{margin:2px 0 10px; font-size:12px; color:var(--ink-soft);}

  .stat-card{background:var(--card-soft); border-radius:14px; padding:20px; text-align:center; margin:2px 0 20px;}
  .stat-card .stat-num{font-size:34px; font-weight:800; color:var(--ink); letter-spacing:-0.02em; line-height:1;}
  .stat-card .stat-label{font-size:11px; color:var(--ink-soft); margin-top:6px; text-transform:uppercase; letter-spacing:0.03em; font-weight:700;}
  .stat-card .stat-fun{font-size:12.5px; color:var(--water); margin-top:10px; font-weight:600;}
  .profile-section{margin-bottom:20px;}
  .profile-section h4{margin:0 0 10px; font-size:11px; color:var(--ink-soft); text-transform:uppercase; letter-spacing:0.03em; font-weight:700;}
  .profile-row{display:flex; justify-content:space-between; align-items:center; font-size:13.5px; padding:6px 0; border-bottom:1px solid var(--line);}
  .profile-row:last-child{border-bottom:none;}
  .profile-row .prlabel{color:var(--ink-soft);}
  .profile-row .prvalue{font-weight:600; color:var(--ink);}
  .logout-btn{background:none; border:1px solid var(--buoy-soft); color:var(--buoy-text); border-radius:10px; padding:9px 16px; font-size:13.5px; font-weight:600; width:100%;}
  .logout-btn:hover{background:var(--buoy-soft);}

  @media (max-width:820px){
    .weekgrid{grid-template-columns:1fr;}
    .daycol{min-width:0;}
    .topbar{flex-wrap:wrap; gap:8px;}
  }
</style>
</head>
<body>
<div id="app"></div>

<script>
(function(){
  const API = '';
  const ROLES = ['operator','manager','lifeguard','gateperson'];
  const ROLE_LABEL = {operator:'Operator', manager:'Manager', lifeguard:'Lifeguard', gateperson:'Gateperson'};

  let state = {
    identity: null,
    workers: [],
    shifts: [],
    availabilityRequests: [],
    availability: [],
    tab: 'schedule',
    weekStart: startOfWeek(new Date()),
    modal: null,
    confirmModal: null,
    loading: true,
    toast: null,
    lastSeenAvail: 0,
    shiftRequests: [],
    users: [],
    dismissedTrades: []
  };

  function uid(){ return Math.random().toString(36).slice(2,10); }

  const LS_KEY = 'springhaven_data';
  const hasClaudeStorage = !!(window.storage && typeof window.storage.get === 'function' && typeof window.storage.set === 'function');
  const emptyStore = function(){ return {users:[],workers:[],shifts:[],availabilityRequests:[],availability:[],shiftRequests:[]}; };
  async function loadStore(){
    try {
      if(hasClaudeStorage){
        const r = await window.storage.get(LS_KEY, true);
        return r ? JSON.parse(r.value) : emptyStore();
      }
      const raw = localStorage.getItem(LS_KEY);
      return raw ? JSON.parse(raw) : emptyStore();
    } catch(e){ return emptyStore(); }
  }
  async function saveStore(d){
    try {
      if(hasClaudeStorage) await window.storage.set(LS_KEY, JSON.stringify(d), true);
      else localStorage.setItem(LS_KEY, JSON.stringify(d));
    } catch(e){ console.error('storage set failed', e); }
  }
  async function getPersonal(key, fallback){
    try {
      if(hasClaudeStorage){
        const r = await window.storage.get(key, false);
        return r ? JSON.parse(r.value) : fallback;
      }
      const raw = localStorage.getItem(key);
      return raw !== null ? JSON.parse(raw) : fallback;
    } catch(e){ return fallback; }
  }
  async function setPersonal(key, value){
    try {
      if(hasClaudeStorage) await window.storage.set(key, JSON.stringify(value), false);
      else localStorage.setItem(key, JSON.stringify(value));
    } catch(e){ console.error('storage set failed', e); }
  }
  async function removePersonal(key){
    try {
      if(hasClaudeStorage) await window.storage.delete(key, false);
      else localStorage.removeItem(key);
    } catch(e){ /* already absent */ }
  }

  async function api(method, path, body){
    var data = await loadStore();
    var parts = path.split('/').filter(Boolean);
    var res = null;
    if(method==='GET' && parts.length===2){
      res = data[parts[1]] || [];
    } else if(method==='POST' && parts.length===2){
      var coll = parts[1];
      var item = Object.assign({id:uid(), createdAt:new Date().toISOString()}, body||{});
      if(coll==='register'){
        if(data.users.length===0){
          item.role='operator'; item.confirmed=true;
        } else {
          item.confirmed=false;
        }
        item.password = btoa(item.password||'');
        data.users.push(item);
        data.workers.push({id:item.id, name:item.name, role:item.role});
        await saveStore(data);
        res = {id:item.id, username:item.username, name:item.name, role:item.role, confirmed:item.confirmed};
      } else if(coll==='login'){
        var u = data.users.find(function(u){return u.username===item.username;});
        if(!u || u.password !== btoa(item.password||'')) return {error:'Invalid username or password', status:401};
        if(!u.confirmed) return {error:'Account pending operator approval. Please wait to be confirmed.', status:403};
        res = {id:u.id, username:u.username, name:u.name, role:u.role};
      } else if(coll==='reset'){
        data = {users:[],workers:[],shifts:[],availabilityRequests:[],availability:[],shiftRequests:[]};
        await saveStore(data);
        res = {ok:true};
      } else {
        data[coll].push(item);
        await saveStore(data);
        res = item;
      }
    } else if(method==='PUT' && parts.length>=3){
      var coll = parts[1]; var id = parts[2];
      var action = parts[3];
      if(action==='confirm'){
        var u = data.users.find(function(u){return u.id===id;});
        if(u){ u.confirmed=true; await saveStore(data); res = {id:u.id, username:u.username, name:u.name, role:u.role, confirmed:true}; }
        else res = null;
      } else if(action==='role'){
        var u = data.users.find(function(u){return u.id===id;});
        if(!u) return {error:'Not found'};
        var newRole = (body||{}).role;
        if(ROLES.indexOf(newRole) === -1) return {error:'Invalid role'};
        u.role = newRole;
        var w = data.workers.find(function(w){return w.id===id;});
        if(w) w.role = newRole;
        await saveStore(data);
        res = {id:u.id, username:u.username, name:u.name, role:u.role, confirmed:u.confirmed};
      } else if(action==='password'){
        var u = data.users.find(function(u){return u.id===id;});
        if(!u) return {error:'Not found'};
        var currentPassword = (body||{}).currentPassword;
        var newPassword = (body||{}).newPassword;
        if(!currentPassword || !newPassword) return {error:'Current and new password are required'};
        if(u.password !== btoa(currentPassword)) return {error:'Current password is incorrect'};
        if(newPassword.length < 4) return {error:'New password must be at least 4 characters'};
        u.password = btoa(newPassword);
        await saveStore(data);
        res = {ok:true};
      } else {
        var arr = data[coll];
        if(arr){
          var idx = arr.findIndex(function(x){return x.id===id;});
          if(idx>=0){ Object.assign(arr[idx], body||{}); await saveStore(data); res = arr[idx]; }
        }
      }
    } else if(method==='DELETE' && parts.length>=3){
      var coll = parts[1]; var id = parts[2];
      if(coll==='users'){
        data.users = data.users.filter(function(u){return u.id!==id;});
        data.workers = (data.workers||[]).filter(function(w){return w.id!==id;});
        await saveStore(data);
        res = {ok:true};
      } else if(data[coll]){
        data[coll] = data[coll].filter(function(x){return x.id!==id;});
        await saveStore(data);
        res = {ok:true};
      }
    }
    return res;
  }

  function startOfWeek(d){
    const dt = new Date(d);
    const day = dt.getDay();
    const diff = (day === 0 ? -6 : 1) - day;
    dt.setDate(dt.getDate() + diff);
    dt.setHours(0,0,0,0);
    return dt;
  }
  function weeklyHoursFor(workerId, date){
    var ws = startOfWeek(new Date(date+'T00:00:00'));
    var we = new Date(ws); we.setDate(we.getDate()+6);
    var wsISO = fmtISO(ws); var weISO = fmtISO(we);
    var total = 0;
    state.shifts.forEach(function(s){
      if(s.workerId !== workerId || s.date < wsISO || s.date > weISO) return;
      if(s.status === 'trade') return;
      var parts1 = s.start.split(':'); var parts2 = s.end.split(':');
      var h1 = parseInt(parts1[0])*60 + parseInt(parts1[1]);
      var h2 = parseInt(parts2[0])*60 + parseInt(parts2[1]);
      total += Math.max(0, h2 - h1);
    });
    return total;
  }
  function fmtHours(mins){
    var h = Math.floor(mins/60); var m = mins%60;
    return m ? h+'h '+m+'m' : h+'h';
  }
  function totalHoursFor(workerId){
    var today = todayISO();
    var total = 0;
    state.shifts.forEach(function(s){
      if(s.workerId !== workerId || s.date > today) return;
      if(s.status === 'trade') return;
      var parts1 = s.start.split(':'); var parts2 = s.end.split(':');
      var h1 = parseInt(parts1[0])*60 + parseInt(parts1[1]);
      var h2 = parseInt(parts2[0])*60 + parseInt(parts2[1]);
      total += Math.max(0, h2 - h1);
    });
    return total;
  }
  function funHoursLine(mins){
    var hrs = mins/60;
    if(hrs < 1) return 'Just getting started — log your first shift!';
    var movies = Math.round(hrs/2);
    if(movies < 1) movies = 1;
    return '≈ ' + movies + (movies===1?' movie':' movies') + ' worth of shifts 🍿';
  }
  function fmtISO(d){
    return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
  }
  function weekDates(ws){
    const out = [];
    for(let i=0;i<7;i++){ const d = new Date(ws); d.setDate(d.getDate()+i); out.push(d); }
    return out;
  }
  function fmtRange(ws){
    const we = new Date(ws); we.setDate(we.getDate()+6);
    const opts = {month:'short', day:'numeric'};
    return ws.toLocaleDateString(undefined,opts) + ' \u2013 ' + we.toLocaleDateString(undefined,opts) + ', ' + we.getFullYear();
  }
  function fmtTime(t){
    const [h,m] = t.split(':').map(Number);
    const ap = h>=12 ? 'PM':'AM';
    const hh = ((h+11)%12)+1;
    return hh + (m? ':'+String(m).padStart(2,'0') : '') + ap;
  }
  function todayISO(){ return fmtISO(new Date()); }

  async function loadAll(){
    const identity = await getPersonal('pool_identity', null);
    const lastSeen = await getPersonal('pool_lastSeenAvail', 0);
    const dismissedTrades = await getPersonal('pool_dismissed_trades', []);
    var data = await loadStore();
    state.identity = identity;
    state.workers = data.workers || [];
    state.shifts = data.shifts || [];
    state.availabilityRequests = data.availabilityRequests || [];
    state.availability = data.availability || [];
    state.shiftRequests = data.shiftRequests || [];
    state.users = (data.users||[]).map(function(u){ return {id:u.id, username:u.username, name:u.name, role:u.role, confirmed:u.confirmed}; });
    state.lastSeenAvail = lastSeen;
    state.dismissedTrades = dismissedTrades || [];
    state.loading = false;
    render();
  }

  function isOperator(){ return state.identity && state.identity.role === 'operator'; }
  function workerName(id){ const w = state.workers.find(w=>w.id===id); return w? w.name : null; }
  function myRole(){ return state.identity ? state.identity.role : null; }
  function shiftRoleKey(s){ return (s.role || '').toLowerCase(); }
  // Who can claim/take which shift:
  //  managers  -> manager shifts only
  //  lifeguards-> lifeguard or gateperson shifts
  //  gatepeople-> gateperson shifts only
  function canClaimShift(s){
    var r = myRole(); var sr = shiftRoleKey(s);
    if(r === 'manager') return sr === 'manager';
    if(r === 'lifeguard') return sr === 'lifeguard' || sr === 'gateperson';
    if(r === 'gateperson') return sr === 'gateperson';
    return false;
  }
  // Schedule visibility:
  //  operator/manager -> everyone
  //  lifeguard/gateperson -> lifeguard & gateperson shifts (plus their own)
  function canSeeShift(s){
    var r = myRole();
    if(r === 'operator' || r === 'manager') return true;
    if(state.identity && s.workerId === state.identity.id) return true;
    var sr = shiftRoleKey(s);
    return sr === 'lifeguard' || sr === 'gateperson';
  }
  function hasNewAvailRequest(){
    if(isOperator()) return false;
    var newReqs = state.availabilityRequests.filter(function(r){ return new Date(r.createdAt).getTime() > state.lastSeenAvail; });
    if(newReqs.length === 0) return false;
    var latestNew = newReqs[newReqs.length - 1];
    var dates = datesInRange(latestNew.fromDate, latestNew.toDate);
    var allFilled = dates.every(function(d){
      return state.availability.some(function(a){ return a.workerId===state.identity.id && a.date===d; });
    });
    return !allFilled;
  }
  function markAvailSeen(){
    state.lastSeenAvail = Date.now();
    setPersonal('pool_lastSeenAvail', state.lastSeenAvail);
  }

  function escapeHtml(str){
    return String(str).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }
  function escapeAttr(str){ return escapeHtml(str); }

  function render(){
    const app = document.getElementById('app');
    if(state.loading){ app.innerHTML = ''; return; }
    if(!state.identity){ app.innerHTML = onboardHTML(); bindOnboard(); return; }
    app.innerHTML = appHTML();
    bindApp();
    if(state.modal) renderModal();
    if(state.toast){
      const t = document.createElement('div');
      t.className = 'toast'; t.textContent = state.toast;
      app.appendChild(t);
    }
    if(state.confirmModal){
      var cm = state.confirmModal;
      var cmWrap = document.createElement('div');
      cmWrap.className = 'modal-bg';
      cmWrap.innerHTML = '<div class="modal" style="max-width:380px;">' +
        '<h3 style="color:var(--buoy);">'+escapeHtml(cm.title)+'</h3>' +
        '<p style="font-size:13px; color:var(--ink); margin:0 0 18px; line-height:1.5; white-space:pre-line;">'+escapeHtml(cm.msg)+'</p>' +
        '<div class="modal-actions"><div></div>' +
        '<div class="right"><button class="cancel-btn" id="cm-no">Cancel</button>' +
        '<button class="primary-btn" id="cm-yes" style="background:var(--buoy);">Continue anyway</button></div></div></div>';
      app.appendChild(cmWrap);
      cmWrap.addEventListener('click', function(e){ if(e.target.id==='modal-bg'){ state.confirmModal=null; cm.resolve(false); render(); } });
      document.getElementById('cm-no').onclick = function(){ state.confirmModal=null; cm.resolve(false); render(); };
      document.getElementById('cm-yes').onclick = function(){ state.confirmModal=null; cm.resolve(true); render(); };
    }
  }

  function bindOnboard(){
    var showReg = document.getElementById('show-register');
    if(showReg) showReg.onclick = function(){ state.authMode = 'register'; render(); };
    var showLogin = document.getElementById('show-login');
    if(showLogin) showLogin.onclick = function(){ state.authMode = 'login'; render(); };

    var submit = document.getElementById('auth-submit');
    if(!submit) return;

    if(state.authMode === 'setup'){
      submit.onclick = async function(){
        var name = document.getElementById('setup-name').value.trim();
        var username = document.getElementById('setup-user').value.trim();
        var password = document.getElementById('setup-pass').value;
        var errEl = document.getElementById('auth-error');
        if(!name || !username || !password){ errEl.textContent = 'Fill in all fields'; errEl.style.display='block'; return; }
        if(password.length < 4){ errEl.textContent = 'Password must be at least 4 characters'; errEl.style.display='block'; return; }
        try {
          var data = await api('POST','/api/register',{username:username, password:password, name:name});
          if(data.error){ errEl.textContent = data.error; errEl.style.display='block'; return; }
          state.identity = data;
          await setPersonal('pool_identity', data);
          await loadAll();
          render();
        } catch(e){ errEl.textContent = 'Error: '+e.message; errEl.style.display='block'; }
      };
    } else if(state.authMode === 'register'){
      submit.onclick = async function(){
        var name = document.getElementById('reg-name').value.trim();
        var role = document.getElementById('reg-role').value;
        var username = document.getElementById('reg-user').value.trim();
        var password = document.getElementById('reg-pass').value;
        var errEl = document.getElementById('auth-error');
        if(!name || !username || !password){ errEl.textContent = 'Fill in all fields'; errEl.style.display='block'; return; }
        if(password.length < 4){ errEl.textContent = 'Password must be at least 4 characters'; errEl.style.display='block'; return; }
        try {
          var data = await api('POST','/api/register',{username:username, password:password, name:name, role:role});
          if(data.error){ errEl.textContent = data.error; errEl.style.display='block'; return; }
          state.identity = data;
          await setPersonal('pool_identity', data);
          await loadAll();
          render();
        } catch(e){ errEl.textContent = 'Error: '+e.message; errEl.style.display='block'; }
      };
    } else {
      submit.onclick = async function(){
        var username = document.getElementById('auth-user').value.trim();
        var password = document.getElementById('auth-pass').value;
        var errEl = document.getElementById('auth-error');
        if(!username || !password){ errEl.textContent = 'Enter username and password'; errEl.style.display='block'; return; }
        try {
          var data = await api('POST','/api/login',{username:username, password:password});
          if(data.error){ errEl.textContent = data.error; errEl.style.display='block'; return; }
          state.identity = data;
          await setPersonal('pool_identity', data);
          await loadAll();
          render();
        } catch(e){ errEl.textContent = 'Error: '+e.message; errEl.style.display='block'; }
      };
    }
  }

  function scheduleHTML(){
    var dates = weekDates(state.weekStart);
    var html = '<div class="weeknav"><div class="nav-btns">' +
      '<button id="wk-prev">&larr; Prev</button>' +
      '<button id="wk-today">This week</button>' +
      '<button id="wk-next">Next &rarr;</button></div>' +
      '<div class="range">'+fmtRange(state.weekStart)+'</div>';
    if(isOperator()) html += '<button class="addshift-btn" id="add-shift-generic">+ Add shift</button>';
    else html += '<span></span>';
    html += '</div>';

    html += '<div class="weekgrid">';
    dates.forEach(function(d){
      var iso = fmtISO(d);
      var dayShifts = state.shifts.filter(function(s){ return s.date===iso && canSeeShift(s); }).sort(function(a,b){ return a.start.localeCompare(b.start); });
      html += '<div class="daycol '+(iso===todayISO()?'today':'')+'">' +
        '<div class="dhead"><div class="dname">'+d.toLocaleDateString(undefined,{weekday:'short'})+'</div>' +
        '<div class="dnum">'+d.getDate()+'</div></div>';
      if(dayShifts.length===0) html += '<div class="empty">No shifts</div>';
      dayShifts.forEach(function(s){ html += shiftCardHTML(s); });
      if(isOperator() && state.availabilityRequests.length > 0){
        var availCount = 0;
        state.workers.forEach(function(w){ if(workerAvailForDate(w.id, iso) && workerAvailForDate(w.id, iso).available) availCount++; });
        if(availCount > 0) html += '<div style="font-size:10px; color:var(--green); font-weight:600; margin-top:4px;">'+availCount+' available</div>';
      }
      if(isOperator()) html += '<button class="addcell" data-add-day="'+iso+'">+ Add shift</button>';
      html += '</div>';
    });
    html += '</div>';
    return html;
  }

  function shiftCardHTML(s){
    var assignedName = s.workerId ? workerName(s.workerId) : null;
    var mine = s.workerId === (state.identity && state.identity.id);
    var cls = 'shiftcard';
    if(s.status==='trade') cls += ' status-trade';
    if(s.status==='open') cls += ' status-open';

    var who;
    if(s.status==='open' || !assignedName){
      who = '<div class="who unfilled">Unfilled</div>';
    } else {
      who = '<div class="who">'+escapeHtml(assignedName)+(mine? ' (you)':'')+'</div>';
    }
    var tag = '';
    if(s.status==='trade') tag = '<div class="status-tag trade">Up for trade</div>';
    if(s.status==='open') tag = '<div class="status-tag open">Needs coverage</div>';

    var actions = '<div class="actions">';
    if(isOperator()){
      actions += '<button class="edit" data-edit="'+s.id+'">Edit</button>';
    }
    if(mine && s.status==='assigned'){
      var pendingDrop = state.shiftRequests.find(function(r){ return r.shiftId===s.id && r.status==='pending' && r.type==='drop'; });
      if(pendingDrop){
        actions += '<button class="drop" disabled style="opacity:0.6; cursor:default;">Drop requested</button>';
      } else {
        actions += '<button class="trade-btn" data-trade="'+s.id+'">Put up for trade</button>';
        actions += '<button class="drop" data-drop="'+s.id+'">Request to drop</button>';
      }
    }
    if(mine && s.status==='trade'){
      actions += '<button class="edit" data-untrade="'+s.id+'">Cancel trade</button>';
    }
    if(!mine && (s.status==='trade' || s.status==='open') && canClaimShift(s)){
      actions += '<button class="claim" data-claim="'+s.id+'">Claim shift</button>';
    }
    actions += '</div>';

    return '<div class="'+cls+'">' +
      '<div class="time">'+fmtTime(s.start)+' \u2013 '+fmtTime(s.end)+'</div>' +
      '<div class="role">'+escapeHtml(s.role)+'</div>' +
      who + tag +
      (s.note ? '<div class="note">'+escapeHtml(s.note)+'</div>' : '') +
      actions + '</div>';
  }

  function boardHTML(){
    var pendingReqs = state.shiftRequests.filter(function(r){ return r.status==='pending'; });
    var upcoming = state.shifts
      .filter(function(s){
        if(!((s.status==='trade' || s.status==='open') && s.date >= todayISO())) return false;
        if(isOperator()) return true;
        var mine = s.workerId === (state.identity && state.identity.id);
        return mine || canClaimShift(s);
      })
      .sort(function(a,b){ return (a.date+a.start).localeCompare(b.date+b.start); });
    var html = '';
    if(isOperator() && pendingReqs.length > 0){
      html += '<div style="margin-bottom:20px;">' +
        '<div style="display:flex; align-items:center; gap:8px; margin-bottom:10px;">' +
        '<h3 style="margin:0; color:var(--deep);">Pending shift requests</h3>' +
        '<span style="background:var(--buoy); color:#fff; font-size:10px; font-weight:700; padding:2px 7px; border-radius:8px;">'+pendingReqs.length+'</span></div>';
      pendingReqs.forEach(function(req){
        var isDrop = req.type === 'drop';
        var label = isDrop ? escapeHtml(req.workerName)+' wants to drop a shift' : escapeHtml(req.workerName)+' wants to claim a shift';
        var btnLabel = isDrop ? 'Approve drop' : 'Approve';
        var shift = state.shifts.find(function(s){ return s.id===req.shiftId; });
        var shiftInfo = shift ? new Date(shift.date+'T00:00:00').toLocaleDateString(undefined,{weekday:'long', month:'short', day:'numeric'})+' '+shift.start+'-'+shift.end : req.shiftDate+' '+req.shiftTime;
        html += '<div class="board-item">' +
          '<div class="left">' +
          '<div class="d1">'+label+'</div>' +
          '<div class="d2">'+shiftInfo+'</div>' +
          (req.comment ? '<div class="d3" style="font-style:italic;">"'+escapeHtml(req.comment)+'"</div>' : '') +
          '<div class="d3" style="color:var(--ink-soft);">Requested '+new Date(req.createdAt).toLocaleDateString()+'</div>' +
          '</div>' +
          '<div style="display:flex; gap:6px;">' +
          '<button class="primary-btn" data-approve-req="'+req.id+'" style="background:var(--green); font-size:12px;">'+btnLabel+'</button>' +
          '<button class="del-link" data-deny-req="'+req.id+'">Deny</button>' +
          '</div></div>';
      });
      html += '</div>';
    }
    if(upcoming.length===0 && !html){
      return '<div class="empty-state"><div class="ring"></div>' +
        '<h3 style="margin:0 0 6px;">Nothing open right now</h3>' +
        '<p style="font-size:13px;">Shifts put up for trade or dropped will show up here for anyone to claim.</p></div>';
    }
    html += '<div style="margin-bottom:14px; font-size:13px; color:var(--ink-soft);">'+(isOperator()?'Shifts up for trade or needing coverage, soonest first.':'Shifts you can pick up, soonest first.')+'</div>';
    upcoming.forEach(function(s){
      var dt = new Date(s.date+'T00:00:00');
      var assignedName = s.workerId ? workerName(s.workerId) : null;
      var mine = s.workerId === (state.identity && state.identity.id);
      html += '<div class="board-item '+s.status+'"><div class="left">' +
        '<div class="d1">'+dt.toLocaleDateString(undefined,{weekday:'long', month:'short', day:'numeric'})+'</div>' +
        '<div class="d2">'+fmtTime(s.start)+' \u2013 '+fmtTime(s.end)+' \u00b7 '+escapeHtml(s.role)+'</div>' +
        '<div class="d3">'+(s.status==='trade' ? 'Up for trade'+(assignedName? ' by '+escapeHtml(assignedName):'')+(mine?' (you)':'') : 'Unfilled \u2014 needs coverage')+(s.note? ' \u00b7 '+escapeHtml(s.note):'')+'</div></div>';
      if(mine) html += '<button class="primary-btn" data-untrade="'+s.id+'">Cancel trade</button>';
      else if(canClaimShift(s)) html += '<button class="primary-btn" data-claim="'+s.id+'">Claim</button>';
      html += '</div>';
    });
    return html;
  }

  function hasPendingRequest(){
    if(isOperator()) return false;
    return state.availabilityRequests.some(function(r){ return true; });
  }
  function getPendingRequest(){
    return state.availabilityRequests[state.availabilityRequests.length - 1];
  }
  function myAvailForDate(date){
    return state.availability.find(function(a){ return a.workerId===state.identity.id && a.date===date; });
  }
  function workerAvailForDate(workerId, date){
    return state.availability.find(function(a){ return a.workerId===workerId && a.date===date; });
  }

  function availabilityHTML(){
    if(isOperator()){
      var html = '';
      html += '<div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:14px;">' +
        '<h3 style="margin:0; color:var(--deep);">Availability Requests</h3>' +
        '<button class="primary-btn" id="new-avail-request">+ Request availability</button></div>';

      if(state.availabilityRequests.length === 0){
        html += '<div class="empty-state">' +
          '<h3 style="margin:0 0 6px;">No requests yet</h3>' +
          '<p style="font-size:13px;">Click "+ Request availability" above to ask workers when they\'re available for an upcoming period.</p></div>';
      } else {
        state.availabilityRequests.slice().reverse().forEach(function(req){
          var fromDate = new Date(req.fromDate+'T00:00:00');
          var toDate = new Date(req.toDate+'T00:00:00');
          var workersWithAvail = 0;
          state.workers.forEach(function(w){
            if(w.role === 'operator') return;
            var hasResponse = state.availability.some(function(a){ return a.workerId===w.id && a.date>=req.fromDate && a.date<=req.toDate; });
            if(hasResponse) workersWithAvail++;
          });
          var nonOperatorCount = state.workers.filter(function(w){ return w.role !== 'operator'; }).length;
          html += '<div class="board-item"><div class="left">' +
            '<div class="d1">'+fmtRange(fromDate)+'</div>' +
            '<div class="d2">'+workersWithAvail+' of '+nonOperatorCount+' workers responded</div>' +
            '<div class="d3">Created '+new Date(req.createdAt).toLocaleDateString()+'</div></div>' +
            '<button class="del-link" data-delete-req="'+req.id+'">Delete</button></div>';
        });

        html += '<div style="margin-top:20px; border-top:1px solid var(--line); padding-top:16px;">' +
          '<h3 style="margin:0 0 10px; color:var(--deep); font-size:15px;">Responses</h3>';

        var latestReq = state.availabilityRequests[state.availabilityRequests.length - 1];
        if(latestReq){
          var allDatesSet = {};
          state.availabilityRequests.forEach(function(req){
            datesInRange(req.fromDate, req.toDate).forEach(function(d){ allDatesSet[d] = true; });
          });
          var dates = Object.keys(allDatesSet).sort();
          html += '<div style="overflow-x:auto;"><table style="width:100%; border-collapse:collapse; font-size:13px;">' +
            '<tr><th style="text-align:left; padding:6px 8px; border-bottom:2px solid var(--line); font-size:11px; text-transform:uppercase; color:var(--ink-soft);">Worker</th>';
          dates.forEach(function(d){
            var dayName = new Date(d+'T00:00:00').toLocaleDateString(undefined,{weekday:'short', month:'short', day:'numeric'});
            html += '<th style="text-align:center; padding:6px 4px; border-bottom:2px solid var(--line); font-size:11px; text-transform:uppercase; color:var(--ink-soft); min-width:50px;">'+dayName+'</th>';
          });
          html += '</tr>';
          state.workers.forEach(function(w){
            if(w.role === 'operator') return;
            html += '<tr><td style="padding:6px 8px; border-bottom:1px solid var(--line); font-weight:600;">'+escapeHtml(w.name)+'</td>';
        dates.forEach(function(d){
              var av = workerAvailForDate(w.id, d);
              if(av){
                if(av.available){
                  var timeNote = '';
                  if(av.afterTime) timeNote = '<br><span style="font-size:9px; font-weight:400;">after '+av.afterTime+'</span>';
                  else if(av.beforeTime) timeNote = '<br><span style="font-size:9px; font-weight:400;">before '+av.beforeTime+'</span>';
                  html += '<td style="text-align:center; padding:6px 4px; border-bottom:1px solid var(--line); color:var(--green); font-weight:700;">&#10003;'+timeNote+'</td>';
                } else html += '<td style="text-align:center; padding:6px 4px; border-bottom:1px solid var(--line); color:var(--buoy); font-weight:700;">&#10007;</td>';
              } else {
                html += '<td style="text-align:center; padding:6px 4px; border-bottom:1px solid var(--line); color:#ccc;">&mdash;</td>';
              }
            });
            html += '</tr>';
          });
          html += '</table></div>';
        }
        html += '</div>';
      }
      return html;
    } else {
      var html = '<h3 style="margin:0 0 14px; color:var(--deep);">My Availability</h3>';
      if(state.availabilityRequests.length === 0){
        html += '<div class="empty-state">' +
          '<h3 style="margin:0 0 6px;">Nothing requested yet</h3>' +
          '<p style="font-size:13px;">The operator hasn\'t requested availability yet. Check back soon.</p></div>';
      } else {
        var allDatesSet = {};
        state.availabilityRequests.forEach(function(req){
          datesInRange(req.fromDate, req.toDate).forEach(function(d){ allDatesSet[d] = true; });
        });
        var allDates = Object.keys(allDatesSet).sort();
        var latestReq = state.availabilityRequests[state.availabilityRequests.length - 1];
        var isNew = new Date(latestReq.createdAt).getTime() > state.lastSeenAvail;
        var filledCount = allDates.filter(function(d){
          return state.availability.some(function(a){ return a.workerId===state.identity.id && a.date===d; });
        }).length;
        var allDone = filledCount === allDates.length;
        if(allDone){
          html += '<div style="background:var(--green); color:#fff; padding:12px 16px; border-radius:8px; margin-bottom:14px; font-weight:600; font-size:13px;">&#10003; All availability filled out ('+filledCount+' of '+allDates.length+' days)</div>';
        } else {
          html += '<p style="font-size:13px; color:var(--ink-soft); margin-bottom:14px;">Mark each day as available or unavailable ('+filledCount+' of '+allDates.length+' days filled)</p>';
        }
        allDates.forEach(function(d){
          var dt = new Date(d+'T00:00:00');
          var av = myAvailForDate(d);
          var status = av ? (av.available ? 'available' : 'unavailable') : '';
          var timeLabel = '';
          if(av && av.available){
            if(av.afterTime) timeLabel = ' after '+av.afterTime;
            else if(av.beforeTime) timeLabel = ' before '+av.beforeTime;
          }
          var btnAvail = '<button class="avail-opt'+(status==='available'?' active-opt':'')+'" data-avail-direct="'+d+'" data-avail-val="available">Available</button>';
          var btnUnavail = '<button class="avail-opt'+(status==='unavailable'?' active-opt-unavail':'')+'" data-avail-direct="'+d+'" data-avail-val="unavailable">Unavailable</button>';
          var btnClear = status ? '<button class="avail-opt" data-avail-direct="'+d+'" data-avail-val="clear" style="font-size:10px; padding:2px 6px;">&#10005; clear</button>' : '';
          html += '<div class="roster-row" style="cursor:default;">' +
            '<span class="rname">'+dt.toLocaleDateString(undefined,{weekday:'long', month:'short', day:'numeric'})+'</span>' +
            '<span style="display:flex; gap:5px; align-items:center;">' +
            btnAvail + btnUnavail + btnClear +
            '</span></div>';
          if(status === 'available'){
            var afterChecked = av && av.afterTime ? 'active-opt' : '';
            var beforeChecked = av && av.beforeTime ? 'active-opt' : '';
            var allDayChecked = (!av || (!av.afterTime && !av.beforeTime)) ? 'active-opt' : '';
            var afterVal = (av && av.afterTime) ? av.afterTime : '09:00';
            var beforeVal = (av && av.beforeTime) ? av.beforeTime : '17:00';
            html += '<div class="roster-row" style="cursor:default; padding:4px 14px 8px;">' +
              '<span style="font-size:11px; display:flex; align-items:center; gap:6px; flex-wrap:wrap;">' +
              '<button class="avail-opt '+allDayChecked+'" data-avail-set="'+d+'" data-avail-type="allday">All day</button>' +
              '<button class="avail-opt '+afterChecked+'" data-avail-set="'+d+'" data-avail-type="after">After <input type="time" class="avail-time-input" data-avail-set="'+d+'" data-avail-type="after" value="'+afterVal+'" onclick="event.stopPropagation()"/></button>' +
              '<button class="avail-opt '+beforeChecked+'" data-avail-set="'+d+'" data-avail-type="before">Before <input type="time" class="avail-time-input" data-avail-set="'+d+'" data-avail-type="before" value="'+beforeVal+'" onclick="event.stopPropagation()"/></button>' +
              '</span></div>';
          }
        });
      }
      return html;
    }
  }

  function datesInRange(from, to){
    var out = [];
    var cur = new Date(from+'T00:00:00');
    var end = new Date(to+'T00:00:00');
    while(cur <= end){
      out.push(fmtISO(cur));
      cur.setDate(cur.getDate()+1);
    }
    return out;
  }

  function rosterHTML(){
    var pendingUsers = state.users.filter(function(u){ return !u.confirmed; });
    var html = '<div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:14px;">' +
      '<h3 style="margin:0; color:var(--deep);">Roster</h3>' +
      '<button class="primary-btn" id="add-worker">+ Add worker</button></div>';

      html += '<div class="pending-panel">' +
        '<div class="pp-head"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>' +
        '<span class="pp-title">New account requests</span></div>' +
        '<p class="pp-sub">These people have registered. Pick their position, then approve to let them log in.</p>';

        html += '<div class="pending-account" data-uid="'+u.id+'">' +

          '<span style="font-weight:700; font-size:15px;">'+escapeHtml(u.name)+'</span>' +
          '</div>' +
          '<p class="pa-user">Username: <code>'+escapeHtml(u.username)+'</code></p>' +
          '<div style="display:flex; gap:10px; align-items:center; flex-wrap:wrap;">' +
          '<label style="font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:0.03em; color:var(--ink-soft);">Position</label>' +
          '<select data-approve-role="'+u.id+'">' +
          '<option value="lifeguard">Lifeguard</option>' +
          '<option value="manager">Manager</option>' +
          '<option value="gateperson">Gateperson</option>' +
          '</select>' +
          '<button class="approve-btn" data-confirm-user="'+u.id+'">Approve</button> ' +
          '<button class="deny-btn" data-deny-user="'+u.id+'">Deny</button>' +
          '</div></div>';
      });
      html += '</div>';
    }

      var isPending = user && !user.confirmed;
      html += '<div class="roster-row'+(isPending ? ' manager-pending' : '')+'"><span class="rname">'+escapeHtml(w.name)+'</span>' +
        '<div style="display:flex; align-items:center; gap:10px;">' +
        '<select data-role-for="'+w.id+'">';
      ROLES.forEach(function(r){
        html += '<option value="'+r+'" '+(w.role===r?'selected':'')+'>'+ROLE_LABEL[r]+'</option>';
      });
      html += '</select><button class="rm-btn" data-remove-worker="'+w.id+'">Remove</button></div></div>';
    });
    html += '<div style="margin-top:30px; border-top:1px solid var(--line); padding-top:16px;">' +
      '<button class="del-link" id="reset-all" style="font-size:13px;">Reset all data (clear everything)</button></div>';
    return html;
  }

  // ================= MODAL =================
  function renderModal(){
    var app = document.getElementById('app');
    var m = state.modal;
    var wrap = document.createElement('div');
    wrap.className = 'modal-bg';
    wrap.id = 'modal-bg';

    if(m.type === 'shift'){
      var editing = !!m.data.id;
      var shiftDate = m.data.date || fmtISO(new Date());
      var shiftStart = m.data.start || '09:00';
      var shiftEnd = m.data.end || '17:00';
      var shiftRole = m.data.role || 'Lifeguard';
      var unselected = !m.data.workerId;
      var unassignedCard = '<div class="worker-card'+(unselected?' selected':'')+'" data-select-worker="" style="border:1px solid '+(unselected?'var(--deep)':'var(--line)')+'; border-radius:8px; padding:8px 10px; margin-bottom:6px; cursor:pointer; background:'+(unselected?'var(--deep); color:#fff;':'#fff;')+'">' +
        '<div style="display:flex; justify-content:space-between; align-items:center;">' +
        '<span style="font-weight:600; font-size:13px;">Unassigned (open)</span>' +
        '</div></div>';
      var workerCards = unassignedCard + state.workers.filter(function(w){ return w.role !== 'operator'; }).map(function(w){
        var isSelected = m.data.workerId === w.id;
        var av = workerAvailForDate(w.id, shiftDate);
        var avLabel = '', avColor = '#999';
        if(av){
          if(av.available){
            if(av.afterTime){ avLabel = 'Available after '+av.afterTime; avColor = 'var(--green)'; }
            else if(av.beforeTime){ avLabel = 'Available before '+av.beforeTime; avColor = 'var(--green)'; }
            else { avLabel = 'Available all day'; avColor = 'var(--green)'; }
          } else { avLabel = 'Unavailable'; avColor = 'var(--buoy)'; }
        } else { avLabel = 'No availability set'; avColor = '#ccc'; }
        var weekMins = weeklyHoursFor(w.id, shiftDate);
        if(editing && m.data.workerId === w.id){
          var oldS = state.shifts.find(function(s){ return s.id===m.data.id; });
          if(oldS && oldS.date === shiftDate){
            var op1 = oldS.start.split(':'); var op2 = oldS.end.split(':');
            weekMins -= Math.max(0, (parseInt(op2[0])*60+parseInt(op2[1])) - (parseInt(op1[0])*60+parseInt(op1[1])));
          }
        }
        var hoursLabel = fmtHours(weekMins);
        var conflicts = state.shifts.filter(function(s){
          return s.workerId === w.id && s.date === shiftDate && s.id !== m.data.id;
        });
        var conflictLabel = '';
        if(conflicts.length > 0){
          var cTimes = conflicts.map(function(c){ return c.start+'-'+c.end; }).join(', ');
          conflictLabel = '<span style="color:var(--buoy); font-size:10px; font-weight:600;">Conflicts: '+cTimes+'</span>';
        }
        var roleMatch = (w.role.toLowerCase() === shiftRole.toLowerCase());
        var roleBadge = roleMatch ? '' : '<span style="font-size:10px; background:var(--sand); border:1px solid var(--line); border-radius:4px; padding:1px 5px; color:var(--ink-soft);">'+ROLE_LABEL[w.role]+'</span>';
        return '<div class="worker-card'+(isSelected?' selected':'')+'" data-select-worker="'+w.id+'" style="border:1px solid '+(isSelected?'var(--deep)':'var(--line)')+'; border-radius:8px; padding:8px 10px; margin-bottom:6px; cursor:pointer; background:'+(isSelected?'var(--deep); color:#fff;':'#fff;')+'">' +
          '<div class="wk-info">' +
          '<span style="font-weight:600; font-size:13px;">'+escapeHtml(w.name)+' '+roleBadge+'</span>' +
          '<span style="font-size:10px; font-weight:600; color:var(--ink-soft);">Week: '+hoursLabel+'</span>' +
          '</div>' +
          '<div class="wk-info" style="margin-top:3px;">' +
          '<span style="font-size:10px; font-weight:600; color:'+avColor+';">'+avLabel+'</span>' +
          '</div>' + (conflictLabel ? '<div style="margin-top:3px;">'+conflictLabel+'</div>' : '') +
          '</div>';
      }).join('');
      wrap.innerHTML = '<div class="modal">' +
        '<h3>'+(editing? 'Edit shift' : 'Add shift')+'</h3>' +
        '<div class="field"><label>Date</label><input type="date" id="f-date" value="'+shiftDate+'"></div>' +
        '<div class="field row2"><div><label>Start</label><input type="time" id="f-start" value="'+shiftStart+'"></div>' +
        '<div><label>End</label><input type="time" id="f-end" value="'+shiftEnd+'"></div></div>' +
        '<div class="field"><label>Position</label><select id="f-role">' +
        '<option value="Lifeguard" '+(shiftRole==='Lifeguard'?'selected':'')+'>Lifeguard</option>' +
        '<option value="Manager" '+(shiftRole==='Manager'?'selected':'')+'>Manager</option>' +
        '<option value="Gateperson" '+(shiftRole==='Gateperson'?'selected':'')+'>Gateperson</option>' +
        '</select></div>' +
        '<div class="field"><label>Assign to</label>' +
        '<div id="f-worker-list">' + workerCards + '</div>' +
        '<input type="hidden" id="f-worker" value="'+(m.data.workerId||'')+'"/>' +
        '</div>' +
        '<div class="field"><label>Note (optional)</label><input id="f-note" value="'+escapeAttr(m.data.note||'')+'" placeholder="e.g. deep end coverage"></div>' +
        '<div class="modal-actions"><div>'+(editing? '<button class="del-link" id="f-delete">Delete shift</button>':'')+'</div>' +
        '<div class="right"><button class="cancel-btn" id="f-cancel">Cancel</button>' +
        '<button class="primary-btn" id="f-save">'+(editing? 'Save changes':'Add shift')+'</button></div></div></div>';
    } else if(m.type === 'addworker'){
      var roleOpts = ROLES.filter(function(r){ return r !== 'operator'; }).map(function(r){
        return '<option value="'+r+'">'+ROLE_LABEL[r]+'</option>';
      }).join('');
      wrap.innerHTML = '<div class="modal">' +
        '<h3>Add worker</h3>' +
        '<div class="field"><label>Name</label><input id="w-name" placeholder="Full name"></div>' +
        '<div class="field"><label>Role</label><select id="w-role">' + roleOpts +
        '</select></div>' +
        '<div class="modal-actions"><div></div>' +
        '<div class="right"><button class="cancel-btn" id="f-cancel">Cancel</button>' +
        '<button class="primary-btn" id="w-save">Add</button></div></div></div>';
    } else if(m.type === 'availrequest'){
      var today = todayISO();
      var nextWeek = fmtISO(new Date(Date.now()+7*86400000));
      wrap.innerHTML = '<div class="modal">' +
        '<h3>Request Availability</h3>' +
        '<p style="font-size:13px; color:var(--ink-soft); margin:0 0 14px;">Workers will be prompted to mark which days they\'re available in this range.</p>' +

        '<div><label>To</label><input type="date" id="ar-to" value="'+(m.data.toDate||nextWeek)+'"></div></div>' +
        '<div class="modal-actions"><div></div>' +
        '<div class="right"><button class="cancel-btn" id="f-cancel">Cancel</button>' +
        '<button class="primary-btn" id="ar-save">Send request</button></div></div></div>';
    } else if(m.type === 'claimrequest'){
      var s = m.data.shift;
      var shiftLabel = new Date(s.date+'T00:00:00').toLocaleDateString(undefined,{weekday:'short', month:'short', day:'numeric'})+' '+s.start+'-'+s.end;
      wrap.innerHTML = '<div class="modal">' +
