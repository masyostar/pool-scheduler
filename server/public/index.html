<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pool Scheduler — Shift Board</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --deep:#1C3A56;
    --water:#2F5A7D;
    --water-light:#8FB4D1;
    --sand:#F5EFDD;
    --card:#FFFFFF;
    --ink:#16222B;
    --ink-soft:#56646F;
    --buoy:#7B2E2E;
    --amber:#B08D45;
    --green:#2F6E49;
    --line:rgba(28,58,86,0.14);
    --radius:10px;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--sand);
    color:var(--ink);
    font-family:'Inter',sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  #app{min-height:100vh; padding-bottom:60px;}
  h1,h2,h3{
    font-family:'Playfair Display', Georgia, serif;
    font-weight:700;
    letter-spacing:0;
  }
  .mono{font-family:'IBM Plex Mono',monospace;}
  button{font-family:inherit; cursor:pointer;}
  a{color:inherit;}

  .topbar{
    background:var(--deep);
    color:#fff;
    padding:16px 20px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    position:relative;
    overflow:hidden;
  }
  .topbar::after{
    content:"";
    position:absolute;
    left:0; right:0; bottom:0;
    height:3px;
    background:var(--amber);
    opacity:0.95;
  }
  .brand{display:flex; align-items:center; gap:10px;}
  .brand .ring{
    width:30px; height:30px; border-radius:50%;
    border:4px solid var(--amber);
    box-shadow: inset 0 0 0 3px var(--deep), 0 0 0 1px rgba(255,255,255,0.35);
    flex:none;
  }
  .brand-text .t1{font-size:19px; font-weight:700; line-height:1; font-family:'Playfair Display',serif;}
  .brand-text .t2{font-size:11px; color:#D9C79A; letter-spacing:0.08em; text-transform:uppercase; margin-top:2px;}
  .whoami{display:flex; align-items:center; gap:10px; font-size:13px;}
  .badge{
    padding:3px 10px;
    border-radius:20px;
    font-size:11px;
    font-weight:700;
    text-transform:uppercase;
    letter-spacing:0.04em;
  }
  .badge.operator{background:var(--buoy); color:#fff;}
  .badge.manager{background:var(--water-light); color:var(--deep);}
  .badge.lifeguard{background:#fff; color:var(--deep);}
  .badge.gateperson{background:var(--amber); color:var(--deep);}
  .link-btn{
    background:none; border:none; color:#D9C79A; text-decoration:underline;
    font-size:12px; padding:0;
  }

  .tabs{
    display:flex; gap:4px;
    padding:14px 20px 0;
    max-width:1100px; margin:0 auto;
  }
  .tab{
    background:transparent; border:none;
    padding:10px 16px;
    font-family:'Oswald',sans-serif; text-transform:uppercase; letter-spacing:0.03em;
    font-size:13px; font-weight:600;
    color:var(--ink-soft);
    border-bottom:3px solid transparent;
  }
  .tab.active{color:var(--deep); border-bottom-color:var(--buoy);}

  .content{max-width:1100px; margin:0 auto; padding:18px 20px 40px;}

  .weeknav{
    display:flex; align-items:center; justify-content:space-between;
    margin-bottom:14px; flex-wrap:wrap; gap:10px;
  }
  .weeknav .range{font-size:15px; font-weight:600; color:var(--deep);}
  .weeknav button{
    background:var(--card); border:1px solid var(--line); border-radius:8px;
    padding:6px 12px; font-size:13px; color:var(--deep); font-weight:600;
  }
  .weeknav button:hover{background:var(--sand);}
  .nav-btns{display:flex; gap:8px; align-items:center;}

  .addshift-btn, .primary-btn{
    background:var(--deep); color:#fff; border:none; border-radius:8px;
    padding:8px 14px; font-size:13px; font-weight:600;
  }
  .addshift-btn:hover, .primary-btn:hover{background:#0e4c6b;}

  .weekgrid{
    display:grid;
    grid-template-columns:repeat(7,1fr);
    gap:10px;
  }
  .daycol{
    background:rgba(255,255,255,0.5);
    border-radius:var(--radius);
    min-width:150px;
    padding:8px;
    border:1px solid var(--line);
  }
  .daycol.today{outline:2px solid var(--water-light);}
  .daycol .dhead{
    text-align:center; padding:4px 0 8px;
    border-bottom:2px dashed var(--line);
    margin-bottom:8px;
  }
  .daycol .dname{font-size:12px; font-weight:700; color:var(--ink-soft); text-transform:uppercase; letter-spacing:0.05em;}
  .daycol .dnum{font-family:'Oswald',sans-serif; font-size:20px; font-weight:600; color:var(--deep);}

  .shiftcard{
    background:var(--card);
    border-radius:8px;
    padding:8px 9px;
    margin-bottom:7px;
    border-left:4px solid var(--green);
    box-shadow:0 1px 2px rgba(11,59,84,0.08);
  }
  .shiftcard.status-trade{border-left-color:var(--amber);}
  .shiftcard.status-open{border-left-color:var(--buoy); border:1px dashed var(--buoy); border-left-width:4px;}
  .shiftcard .time{font-family:'IBM Plex Mono',monospace; font-size:12px; font-weight:600; color:var(--deep);}
  .shiftcard .role{font-size:10px; text-transform:uppercase; letter-spacing:0.04em; color:var(--ink-soft); margin-top:1px;}
  .shiftcard .who{font-size:13px; font-weight:600; margin-top:4px;}
  .shiftcard .who.unfilled{color:var(--buoy);}
  .shiftcard .status-tag{
    display:inline-block; font-size:9px; font-weight:700; text-transform:uppercase;
    padding:1px 6px; border-radius:10px; margin-top:4px; letter-spacing:0.03em;
  }
  .status-tag.trade{background:rgba(176,141,69,0.18); color:#6b5220;}
  .status-tag.open{background:rgba(123,46,46,0.14); color:#5a2222;}
  .shiftcard .note{font-size:11px; color:var(--ink-soft); margin-top:3px; font-style:italic;}
  .shiftcard .actions{display:flex; flex-wrap:wrap; gap:5px; margin-top:6px;}
  .shiftcard .actions button{
    font-size:10.5px; border:1px solid var(--line); background:var(--sand);
    border-radius:6px; padding:3px 7px; font-weight:600; color:var(--deep);
  }
  .shiftcard .actions button.claim{background:var(--green); color:#fff; border-color:var(--green);}
  .shiftcard .actions button.drop{background:#fff; color:var(--buoy); border-color:var(--buoy);}
  .shiftcard .actions button.trade-btn{background:#fff; color:#6b5220; border-color:var(--amber);}
  .shiftcard .actions button.edit{background:#fff;}
  .shiftcard .actions button.del{color:#b33; border-color:#e2b7b7;}
  .daycol .addcell{
    width:100%; background:none; border:1px dashed var(--line); border-radius:6px;
    padding:6px; font-size:11px; color:var(--ink-soft); font-weight:600; margin-top:2px;
  }
  .daycol .addcell:hover{background:rgba(255,255,255,0.7); color:var(--deep);}
  .daycol .empty{font-size:11px; color:#a9b8bd; text-align:center; padding:10px 0;}

  .board-item{
    background:var(--card); border-radius:8px; padding:10px 12px;
    display:flex; align-items:center; justify-content:space-between; gap:10px;
    margin-bottom:8px; border:1px solid var(--line); border-left:4px solid var(--buoy);
  }
  .board-item.trade{border-left-color:var(--amber);}
  .board-item .left .d1{font-weight:700; font-size:13px; color:var(--deep);}
  .board-item .left .d2{font-size:12px; color:var(--ink-soft); font-family:'IBM Plex Mono',monospace;}
  .board-item .left .d3{font-size:11px; margin-top:2px;}

  .empty-state{
    text-align:center; padding:50px 20px; color:var(--ink-soft);
  }
  .empty-state .ring{
    width:44px; height:44px; border-radius:50%; border:5px solid var(--buoy);
    margin:0 auto 14px; box-shadow:inset 0 0 0 3px var(--sand);
  }

  .roster-row{
    display:flex; align-items:center; justify-content:space-between;
    background:var(--card); border:1px solid var(--line); border-radius:8px;
    padding:10px 12px; margin-bottom:8px; flex-wrap:wrap; gap:8px;
  }
  .roster-row select{
    font-family:'Inter',sans-serif; font-size:12px; padding:4px 6px; border-radius:6px; border:1px solid var(--line);
  }
  .roster-row .rname{font-weight:600; font-size:14px;}
  .roster-row .rm-btn{background:none; border:none; color:#b33; font-size:12px; text-decoration:underline;}

  .modal-bg{
    position:fixed; inset:0; background:rgba(22,34,43,0.55);
    display:flex; align-items:center; justify-content:center; padding:16px; z-index:50;
  }
  .modal{
    background:#fff; border-radius:12px; padding:22px; width:100%; max-width:420px;
    max-height:90vh; overflow-y:auto;
  }
  .modal h3{margin:0 0 14px; font-size:18px; color:var(--deep);}
  .field{margin-bottom:12px;}
  .field label{display:block; font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:0.03em; color:var(--ink-soft); margin-bottom:4px;}
  .field input, .field select, .field textarea{
    width:100%; padding:8px 10px; border:1px solid var(--line); border-radius:7px;
    font-family:'Inter',sans-serif; font-size:14px; background:var(--sand);
  }
  .field.row2{display:flex; gap:10px;}
  .field.row2 > div{flex:1;}
  .modal-actions{display:flex; justify-content:space-between; align-items:center; margin-top:16px;}
  .modal-actions .right{display:flex; gap:8px;}
  .cancel-btn{background:none; border:none; color:var(--ink-soft); font-size:13px; font-weight:600;}
  .del-link{background:none; border:none; color:#b33; font-size:12px; text-decoration:underline;}

  .onboard-wrap{
    max-width:420px; margin:60px auto; padding:0 20px;
  }
  .onboard-card{
    background:var(--card); border-radius:14px; padding:28px; box-shadow:0 4px 24px rgba(28,58,86,0.16);
  }
  .onboard-card h2{margin-top:0; color:var(--deep); font-size:22px;}
  .onboard-card p{font-size:13px; color:var(--ink-soft); line-height:1.5;}
  .roster-pick{
    display:flex; align-items:center; justify-content:space-between;
    padding:10px 12px; border:1px solid var(--line); border-radius:8px; margin-bottom:8px; background:var(--sand);
  }
  .roster-pick button{background:var(--deep); color:#fff; border:none; border-radius:6px; padding:6px 12px; font-size:12px; font-weight:600;}
  .divider-or{text-align:center; font-size:11px; color:#a9b8bd; margin:16px 0; text-transform:uppercase; letter-spacing:0.08em;}

  .toast{
    position:fixed; bottom:18px; left:50%; transform:translateX(-50%);
    background:var(--deep); color:#fff; padding:9px 18px; border-radius:20px;
    font-size:13px; font-weight:600; box-shadow:0 4px 14px rgba(0,0,0,0.2); z-index:60;
  }

  .notif-badge{
    position:absolute; top:-4px; right:-4px;
    background:var(--buoy); color:#fff; font-size:9px; font-weight:700;
    width:16px; height:16px; border-radius:50%; display:flex; align-items:center; justify-content:center;
    border:2px solid var(--deep); line-height:1;
  }
  .tab-badge{
    display:inline-flex; align-items:center; justify-content:center;
    background:var(--buoy); color:#fff; font-size:10px; font-weight:700;
    min-width:16px; height:16px; border-radius:8px; padding:0 4px; margin-left:4px; vertical-align:middle;
  }
  .notif-bell{
    position:relative; background:none; border:none; color:var(--water-light); font-size:18px;
    padding:4px; cursor:pointer; line-height:1;
  }
  .notif-bell.has-new{ color:var(--amber); }

  @media (max-width:820px){
    .weekgrid{grid-template-columns:1fr;}
    .daycol{min-width:0;}
    .topbar{flex-wrap:wrap; gap:8px;}
  }
</style>
</head>
<body>
<div id="app"></div>

<script>
(function(){
  const API = '';
  const ROLES = ['operator','manager','lifeguard','gateperson'];
  const ROLE_LABEL = {operator:'Operator', manager:'Manager', lifeguard:'Lifeguard', gateperson:'Gateperson'};

  let state = {
    identity: null,
    workers: [],
    shifts: [],
    availabilityRequests: [],
    availability: [],
    tab: 'schedule',
    weekStart: startOfWeek(new Date()),
    modal: null,
    loading: true,
    toast: null,
    lastSeenAvail: 0
  };

  function uid(){ return Math.random().toString(36).slice(2,10); }

  async function api(method, path, body){
    const opts = { method, headers: {'Content-Type':'application/json'} };
    if(body) opts.body = JSON.stringify(body);
    const r = await fetch(API + path, opts);
    return r.json();
  }

  function showToast(msg){
    state.toast = msg;
    render();
    setTimeout(()=>{ state.toast = null; render(); }, 2200);
  }

  function startOfWeek(d){
    const dt = new Date(d);
    const day = dt.getDay();
    const diff = (day === 0 ? -6 : 1) - day;
    dt.setDate(dt.getDate() + diff);
    dt.setHours(0,0,0,0);
    return dt;
  }
  function fmtISO(d){
    return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
  }
  function weekDates(ws){
    const out = [];
    for(let i=0;i<7;i++){ const d = new Date(ws); d.setDate(d.getDate()+i); out.push(d); }
    return out;
  }
  function fmtRange(ws){
    const we = new Date(ws); we.setDate(we.getDate()+6);
    const opts = {month:'short', day:'numeric'};
    return ws.toLocaleDateString(undefined,opts) + ' \u2013 ' + we.toLocaleDateString(undefined,opts) + ', ' + we.getFullYear();
  }
  function fmtTime(t){
    const [h,m] = t.split(':').map(Number);
    const ap = h>=12 ? 'PM':'AM';
    const hh = ((h+11)%12)+1;
    return hh + (m? ':'+String(m).padStart(2,'0') : '') + ap;
  }
  function todayISO(){ return fmtISO(new Date()); }

  async function loadAll(){
    const identity = JSON.parse(localStorage.getItem('pool_identity') || 'null');
    const lastSeen = parseInt(localStorage.getItem('pool_lastSeenAvail') || '0');
    const [workers, shifts, availRequests, availability] = await Promise.all([
      api('GET','/api/workers'),
      api('GET','/api/shifts'),
      api('GET','/api/availability-requests'),
      api('GET','/api/availability')
    ]);
    state.identity = identity;
    state.workers = workers || [];
    state.shifts = shifts || [];
    state.availabilityRequests = availRequests || [];
    state.availability = availability || [];
    state.lastSeenAvail = lastSeen;
    state.loading = false;
    render();
  }

  function isOperator(){ return state.identity && state.identity.role === 'operator'; }
  function workerName(id){ const w = state.workers.find(w=>w.id===id); return w? w.name : null; }
  function hasNewAvailRequest(){
    if(isOperator()) return false;
    return state.availabilityRequests.some(function(r){ return new Date(r.createdAt).getTime() > state.lastSeenAvail; });
  }
  function markAvailSeen(){
    state.lastSeenAvail = Date.now();
    localStorage.setItem('pool_lastSeenAvail', String(state.lastSeenAvail));
  }

  function escapeHtml(str){
    return String(str).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }
  function escapeAttr(str){ return escapeHtml(str); }

  function render(){
    const app = document.getElementById('app');
    if(state.loading){ app.innerHTML = ''; return; }
    if(!state.identity){ app.innerHTML = onboardHTML(); bindOnboard(); return; }
    app.innerHTML = appHTML();
    bindApp();
    if(state.modal) renderModal();
    if(state.toast){
      const t = document.createElement('div');
      t.className = 'toast'; t.textContent = state.toast;
      app.appendChild(t);
    }
  }

  // ================= ONBOARDING =================
  function onboardHTML(){
    const hasRoster = state.workers.length > 0;
    let html = '<div class="onboard-wrap"><div class="onboard-card">';
    if(!hasRoster){
      html += '<h2>Set up your pool\'s shift board</h2>' +
        '<p>Nobody\'s set this up yet. Enter your name to create the pool staff roster \u2014 you\'ll be the Operator, in charge of building and editing the schedule.</p>' +
        '<div class="field"><label>Your name</label><input id="ob-name" placeholder="e.g. Jamie Rivera"/></div>' +
        '<button class="primary-btn" id="ob-create" style="width:100%; padding:10px;">Create schedule &amp; become Operator</button>';
    } else {
      html += '<h2>Who\'s this?</h2><p>Pick your name to view and manage your shifts.</p>';
      const byRole = {operator:[], manager:[], lifeguard:[], gateperson:[]};
      state.workers.forEach(function(w){ byRole[w.role] = byRole[w.role] || []; byRole[w.role].push(w); });
      ['operator','manager','lifeguard','gateperson'].forEach(function(r){
        if(byRole[r] && byRole[r].length){
          html += '<div style="font-size:11px;font-weight:700;text-transform:uppercase;color:var(--ink-soft);margin:12px 0 6px;">'+ROLE_LABEL[r]+'s</div>';
          byRole[r].forEach(function(w){
            html += '<div class="roster-pick"><span class="rname">'+escapeHtml(w.name)+'</span><button data-pick="'+w.id+'">This is me</button></div>';
          });
        }
      });
      html += '<div class="divider-or">or</div>' +
        '<div class="field"><label>Add yourself to the roster</label><input id="ob-newname" placeholder="Your name"/></div>' +
        '<div class="field"><label>Your role</label>' +
        '<select id="ob-newrole"><option value="lifeguard">Lifeguard</option><option value="manager">Manager</option><option value="gateperson">Gateperson</option></select></div>' +
        '<button class="primary-btn" id="ob-addme" style="width:100%; padding:10px;">Add me &amp; continue</button>';
    }
    html += '</div></div>';
    return html;
  }

  function bindOnboard(){
    var create = document.getElementById('ob-create');
    if(create){
      create.onclick = async function(){
        var name = document.getElementById('ob-name').value.trim();
        if(!name){ showToast('Enter your name first'); return; }
        var w = await api('POST','/api/workers',{name:name, role:'operator'});
        state.workers.push(w);
        state.identity = {id:w.id, name:w.name, role:w.role};
        localStorage.setItem('pool_identity', JSON.stringify(state.identity));
        render();
      };
    }
    document.querySelectorAll('[data-pick]').forEach(function(btn){
      btn.onclick = function(){
        var w = state.workers.find(function(w){ return w.id===btn.dataset.pick; });
        state.identity = {id:w.id, name:w.name, role:w.role};
        localStorage.setItem('pool_identity', JSON.stringify(state.identity));
        render();
      };
    });
    var addme = document.getElementById('ob-addme');
    if(addme){
      addme.onclick = async function(){
        var name = document.getElementById('ob-newname').value.trim();
        var role = document.getElementById('ob-newrole').value;
        if(!name){ showToast('Enter your name first'); return; }
        var w = await api('POST','/api/workers',{name:name, role:role});
        state.workers.push(w);
        state.identity = {id:w.id, name:w.name, role:w.role};
        localStorage.setItem('pool_identity', JSON.stringify(state.identity));
        render();
      };
    }
  }

  // ================= MAIN APP =================
  function appHTML(){
    var html = '<div class="topbar">' +
      '<div class="brand"><div class="ring"></div>' +
      '<div class="brand-text"><div class="t1">Pool Scheduler</div><div class="t2">Staff Shift Board</div></div></div>' +
      '<div class="whoami">';
    if(!isOperator() && hasNewAvailRequest()){
      html += '<button class="notif-bell has-new" id="notif-bell" title="New availability request!">&#128276;<span class="notif-badge">!</span></button>';
    }
    html += '<span class="badge '+state.identity.role+'">'+ROLE_LABEL[state.identity.role]+'</span>' +
      '<span>'+escapeHtml(state.identity.name)+'</span>' +
      '<button class="link-btn" id="switch-user">Switch user</button></div></div>';

    html += '<div class="tabs">' +
      '<button class="tab '+(state.tab==='schedule'?'active':'')+'" data-tab="schedule">Schedule</button>' +
      '<button class="tab '+(state.tab==='board'?'active':'')+'" data-tab="board">Open &amp; Trade</button>' +
      '<button class="tab '+(state.tab==='availability'?'active':'')+'" data-tab="availability">Availability'+((!isOperator() && hasNewAvailRequest()) ? '<span class="tab-badge">!</span>' : '')+'</button>';
    if(isOperator()) html += '<button class="tab '+(state.tab==='roster'?'active':'')+'" data-tab="roster">Roster</button>';
    html += '</div><div class="content">';

    if(!isOperator() && hasPendingRequest()){
      var req = getPendingRequest();
      html += '<div style="background:var(--amber); color:var(--deep); padding:10px 14px; border-radius:8px; margin-bottom:14px; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:8px;">' +
        '<span style="font-weight:600; font-size:13px;">Availability needed for '+fmtRange(new Date(req.fromDate+'T00:00:00'))+'</span>' +
        '<button class="primary-btn" id="fill-availability" style="background:var(--deep);">Fill out availability</button></div>';
    }

    if(state.tab === 'schedule') html += scheduleHTML();
    else if(state.tab === 'board') html += boardHTML();
    else if(state.tab === 'availability') html += availabilityHTML();
    else if(state.tab === 'roster') html += rosterHTML();
    html += '</div>';
    return html;
  }

  function scheduleHTML(){
    var dates = weekDates(state.weekStart);
    var html = '<div class="weeknav"><div class="nav-btns">' +
      '<button id="wk-prev">&larr; Prev</button>' +
      '<button id="wk-today">This week</button>' +
      '<button id="wk-next">Next &rarr;</button></div>' +
      '<div class="range">'+fmtRange(state.weekStart)+'</div>';
    if(isOperator()) html += '<button class="addshift-btn" id="add-shift-generic">+ Add shift</button>';
    else html += '<span></span>';
    html += '</div>';

    html += '<div class="weekgrid">';
    dates.forEach(function(d){
      var iso = fmtISO(d);
      var dayShifts = state.shifts.filter(function(s){ return s.date===iso; }).sort(function(a,b){ return a.start.localeCompare(b.start); });
      html += '<div class="daycol '+(iso===todayISO()?'today':'')+'">' +
        '<div class="dhead"><div class="dname">'+d.toLocaleDateString(undefined,{weekday:'short'})+'</div>' +
        '<div class="dnum">'+d.getDate()+'</div></div>';
      if(dayShifts.length===0) html += '<div class="empty">No shifts</div>';
      dayShifts.forEach(function(s){ html += shiftCardHTML(s); });
      if(isOperator() && state.availabilityRequests.length > 0){
        var availCount = 0;
        state.workers.forEach(function(w){ if(workerAvailForDate(w.id, iso) && workerAvailForDate(w.id, iso).available) availCount++; });
        if(availCount > 0) html += '<div style="font-size:10px; color:var(--green); font-weight:600; margin-top:4px;">'+availCount+' available</div>';
      }
      if(isOperator()) html += '<button class="addcell" data-add-day="'+iso+'">+ Add shift</button>';
      html += '</div>';
    });
    html += '</div>';
    return html;
  }

  function shiftCardHTML(s){
    var assignedName = s.workerId ? workerName(s.workerId) : null;
    var mine = s.workerId === (state.identity && state.identity.id);
    var cls = 'shiftcard';
    if(s.status==='trade') cls += ' status-trade';
    if(s.status==='open') cls += ' status-open';

    var who;
    if(s.status==='open' || !assignedName){
      who = '<div class="who unfilled">Unfilled</div>';
    } else {
      who = '<div class="who">'+escapeHtml(assignedName)+(mine? ' (you)':'')+'</div>';
    }
    var tag = '';
    if(s.status==='trade') tag = '<div class="status-tag trade">Up for trade</div>';
    if(s.status==='open') tag = '<div class="status-tag open">Needs coverage</div>';

    var actions = '<div class="actions">';
    if(isOperator()){
      actions += '<button class="edit" data-edit="'+s.id+'">Edit</button>';
    }
    if(mine && s.status==='assigned'){
      actions += '<button class="trade-btn" data-trade="'+s.id+'">Put up for trade</button>';
      actions += '<button class="drop" data-drop="'+s.id+'">Drop shift</button>';
    }
    if(mine && s.status==='trade'){
      actions += '<button class="edit" data-untrade="'+s.id+'">Cancel trade</button>';
    }
    if(!mine && (s.status==='trade' || s.status==='open')){
      actions += '<button class="claim" data-claim="'+s.id+'">Claim shift</button>';
    }
    actions += '</div>';

    return '<div class="'+cls+'">' +
      '<div class="time">'+fmtTime(s.start)+' \u2013 '+fmtTime(s.end)+'</div>' +
      '<div class="role">'+escapeHtml(s.role)+'</div>' +
      who + tag +
      (s.note ? '<div class="note">'+escapeHtml(s.note)+'</div>' : '') +
      actions + '</div>';
  }

  function boardHTML(){
    var upcoming = state.shifts
      .filter(function(s){ return (s.status==='trade' || s.status==='open') && s.date >= todayISO(); })
      .sort(function(a,b){ return (a.date+a.start).localeCompare(b.date+b.start); });
    if(upcoming.length===0){
      return '<div class="empty-state"><div class="ring"></div>' +
        '<h3 style="margin:0 0 6px;">Nothing open right now</h3>' +
        '<p style="font-size:13px;">Shifts put up for trade or dropped will show up here for anyone to claim.</p></div>';
    }
    var html = '<div style="margin-bottom:14px; font-size:13px; color:var(--ink-soft);">Shifts anyone can pick up, soonest first.</div>';
    upcoming.forEach(function(s){
      var dt = new Date(s.date+'T00:00:00');
      var assignedName = s.workerId ? workerName(s.workerId) : null;
      var mine = s.workerId === (state.identity && state.identity.id);
      html += '<div class="board-item '+s.status+'"><div class="left">' +
        '<div class="d1">'+dt.toLocaleDateString(undefined,{weekday:'long', month:'short', day:'numeric'})+'</div>' +
        '<div class="d2">'+fmtTime(s.start)+' \u2013 '+fmtTime(s.end)+' \u00b7 '+escapeHtml(s.role)+'</div>' +
        '<div class="d3">'+(s.status==='trade' ? 'Up for trade'+(assignedName? ' by '+escapeHtml(assignedName):'')+(mine?' (you)':'') : 'Unfilled \u2014 needs coverage')+(s.note? ' \u00b7 '+escapeHtml(s.note):'')+'</div></div>';
      if(mine) html += '<button class="primary-btn" data-untrade="'+s.id+'">Cancel trade</button>';
      else html += '<button class="primary-btn" data-claim="'+s.id+'">Claim</button>';
      html += '</div>';
    });
    return html;
  }

  function hasPendingRequest(){
    if(isOperator()) return false;
    return state.availabilityRequests.some(function(r){ return true; });
  }
  function getPendingRequest(){
    return state.availabilityRequests[state.availabilityRequests.length - 1];
  }
  function myAvailForDate(date){
    return state.availability.find(function(a){ return a.workerId===state.identity.id && a.date===date; });
  }
  function workerAvailForDate(workerId, date){
    return state.availability.find(function(a){ return a.workerId===workerId && a.date===date; });
  }

  function availabilityHTML(){
    if(isOperator()){
      var html = '';
      html += '<div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:14px;">' +
        '<h3 style="margin:0; color:var(--deep);">Availability Requests</h3>' +
        '<button class="primary-btn" id="new-avail-request">+ Request availability</button></div>';

      if(state.availabilityRequests.length === 0){
        html += '<div class="empty-state"><div class="ring"></div>' +
          '<h3 style="margin:0 0 6px;">No requests yet</h3>' +
          '<p style="font-size:13px;">Create a request to ask workers when they\'re available for an upcoming period.</p></div>';
      } else {
        state.availabilityRequests.slice().reverse().forEach(function(req){
          var fromDate = new Date(req.fromDate+'T00:00:00');
          var toDate = new Date(req.toDate+'T00:00:00');
          var workersWithAvail = 0;
          state.workers.forEach(function(w){
            var hasResponse = state.availability.some(function(a){ return a.workerId===w.id && a.date>=req.fromDate && a.date<=req.toDate; });
            if(hasResponse) workersWithAvail++;
          });
          html += '<div class="board-item"><div class="left">' +
            '<div class="d1">'+fmtRange(fromDate)+'</div>' +
            '<div class="d2">'+workersWithAvail+' of '+state.workers.length+' workers responded</div>' +
            '<div class="d3">Created '+new Date(req.createdAt).toLocaleDateString()+'</div></div>' +
            '<button class="del-link" data-delete-req="'+req.id+'">Delete</button></div>';
        });

        html += '<div style="margin-top:20px; border-top:1px solid var(--line); padding-top:16px;">' +
          '<h3 style="margin:0 0 10px; color:var(--deep); font-size:15px;">Responses</h3>';

        var latestReq = state.availabilityRequests[state.availabilityRequests.length - 1];
        if(latestReq){
          html += '<div style="overflow-x:auto;"><table style="width:100%; border-collapse:collapse; font-size:13px;">' +
            '<tr><th style="text-align:left; padding:6px 8px; border-bottom:2px solid var(--line); font-size:11px; text-transform:uppercase; color:var(--ink-soft);">Worker</th>';
          var dates = datesInRange(latestReq.fromDate, latestReq.toDate);
          dates.forEach(function(d){
            var dayName = new Date(d+'T00:00:00').toLocaleDateString(undefined,{weekday:'short', month:'short', day:'numeric'});
            html += '<th style="text-align:center; padding:6px 4px; border-bottom:2px solid var(--line); font-size:11px; text-transform:uppercase; color:var(--ink-soft); min-width:50px;">'+dayName+'</th>';
          });
          html += '</tr>';
          state.workers.forEach(function(w){
            html += '<tr><td style="padding:6px 8px; border-bottom:1px solid var(--line); font-weight:600;">'+escapeHtml(w.name)+'</td>';
            dates.forEach(function(d){
              var av = workerAvailForDate(w.id, d);
              if(av){
                if(av.available) html += '<td style="text-align:center; padding:6px 4px; border-bottom:1px solid var(--line); color:var(--green); font-weight:700;">&#10003;</td>';
                else html += '<td style="text-align:center; padding:6px 4px; border-bottom:1px solid var(--line); color:var(--buoy); font-weight:700;">&#10007;</td>';
              } else {
                html += '<td style="text-align:center; padding:6px 4px; border-bottom:1px solid var(--line); color:#ccc;">&mdash;</td>';
              }
            });
            html += '</tr>';
          });
          html += '</table></div>';
        }
        html += '</div>';
      }
      return html;
    } else {
      var html = '<h3 style="margin:0 0 14px; color:var(--deep);">My Availability</h3>';
      if(state.availabilityRequests.length === 0){
        html += '<div class="empty-state"><div class="ring"></div>' +
          '<h3 style="margin:0 0 6px;">Nothing requested yet</h3>' +
          '<p style="font-size:13px;">The operator hasn\'t requested availability yet. Check back soon.</p></div>';
      } else {
        var latestReq = state.availabilityRequests[state.availabilityRequests.length - 1];
        var dates = datesInRange(latestReq.fromDate, latestReq.toDate);
        var isNew = new Date(latestReq.createdAt).getTime() > state.lastSeenAvail;
        html += '<p style="font-size:13px; color:var(--ink-soft); margin-bottom:14px;">Mark each day as available or unavailable for '+fmtRange(new Date(latestReq.fromDate+'T00:00:00'))+(isNew ? ' <span style="background:var(--buoy); color:#fff; font-size:10px; font-weight:700; padding:1px 6px; border-radius:8px; text-transform:uppercase;">New</span>' : '')+'</p>';
        dates.forEach(function(d){
          var dt = new Date(d+'T00:00:00');
          var av = myAvailForDate(d);
          var status = av ? (av.available ? 'available' : 'unavailable') : '';
          html += '<div class="roster-row" style="cursor:pointer;" data-avail-toggle="'+d+'">' +
            '<span class="rname">'+dt.toLocaleDateString(undefined,{weekday:'long', month:'short', day:'numeric'})+'</span>' +
            '<span style="font-size:12px; font-weight:600; padding:4px 10px; border-radius:6px; ' +
            (status==='available' ? 'background:var(--green); color:#fff;' : status==='unavailable' ? 'background:var(--buoy); color:#fff;' : 'background:var(--sand); border:1px solid var(--line); color:var(--ink-soft);') +
            '">'+(status==='available' ? 'Available' : status==='unavailable' ? 'Unavailable' : 'Not set')+'</span></div>';
        });
      }
      return html;
    }
  }

  function datesInRange(from, to){
    var out = [];
    var cur = new Date(from+'T00:00:00');
    var end = new Date(to+'T00:00:00');
    while(cur <= end){
      out.push(fmtISO(cur));
      cur.setDate(cur.getDate()+1);
    }
    return out;
  }

  function rosterHTML(){
    var html = '<div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:14px;">' +
      '<h3 style="margin:0; color:var(--deep);">Roster</h3>' +
      '<button class="primary-btn" id="add-worker">+ Add worker</button></div>';
    state.workers.forEach(function(w){
      html += '<div class="roster-row"><span class="rname">'+escapeHtml(w.name)+'</span>' +
        '<div style="display:flex; align-items:center; gap:10px;">' +
        '<select data-role-for="'+w.id+'">';
      ROLES.forEach(function(r){
        html += '<option value="'+r+'" '+(w.role===r?'selected':'')+'>'+ROLE_LABEL[r]+'</option>';
      });
      html += '</select><button class="rm-btn" data-remove-worker="'+w.id+'">Remove</button></div></div>';
    });
    html += '<div style="margin-top:30px; border-top:1px solid var(--line); padding-top:16px;">' +
      '<button class="del-link" id="reset-all" style="font-size:13px;">Reset all data (clear everything)</button></div>';
    return html;
  }

  // ================= MODAL =================
  function renderModal(){
    var app = document.getElementById('app');
    var m = state.modal;
    var wrap = document.createElement('div');
    wrap.className = 'modal-bg';
    wrap.id = 'modal-bg';

    if(m.type === 'shift'){
      var editing = !!m.data.id;
      wrap.innerHTML = '<div class="modal">' +
        '<h3>'+(editing? 'Edit shift' : 'Add shift')+'</h3>' +
        '<div class="field"><label>Date</label><input type="date" id="f-date" value="'+(m.data.date || '')+'"></div>' +
        '<div class="field row2"><div><label>Start</label><input type="time" id="f-start" value="'+(m.data.start || '09:00')+'"></div>' +
        '<div><label>End</label><input type="time" id="f-end" value="'+(m.data.end || '17:00')+'"></div></div>' +
        '<div class="field"><label>Position</label><select id="f-role">' +
        '<option value="Lifeguard" '+(m.data.role==='Lifeguard'?'selected':'')+'>Lifeguard</option>' +
        '<option value="Manager" '+(m.data.role==='Manager'?'selected':'')+'>Manager</option>' +
        '<option value="Gateperson" '+(m.data.role==='Gateperson'?'selected':'')+'>Gateperson</option>' +
        '</select></div>' +
        '<div class="field"><label>Assign to</label><select id="f-worker">' +
        '<option value="">Unassigned (open)</option>';
      state.workers.forEach(function(w){
        wrap.innerHTML += '';
      });
      var workerOpts = state.workers.map(function(w){
        return '<option value="'+w.id+'" '+(m.data.workerId===w.id?'selected':'')+'>'+escapeHtml(w.name)+' ('+ROLE_LABEL[w.role]+')</option>';
      }).join('');
      wrap.innerHTML += workerOpts +
        '</select></div>' +
        '<div class="field"><label>Note (optional)</label><input id="f-note" value="'+escapeAttr(m.data.note||'')+'" placeholder="e.g. deep end coverage"></div>' +
        '<div class="modal-actions"><div>'+(editing? '<button class="del-link" id="f-delete">Delete shift</button>':'')+'</div>' +
        '<div class="right"><button class="cancel-btn" id="f-cancel">Cancel</button>' +
        '<button class="primary-btn" id="f-save">'+(editing? 'Save changes':'Add shift')+'</button></div></div></div>';
    } else if(m.type === 'addworker'){
      wrap.innerHTML = '<div class="modal">' +
        '<h3>Add worker</h3>' +
        '<div class="field"><label>Name</label><input id="w-name" placeholder="Full name"></div>' +
        '<div class="field"><label>Role</label><select id="w-role">';
      ROLES.forEach(function(r){ wrap.innerHTML += '<option value="'+r+'">'+ROLE_LABEL[r]+'</option>'; });
      wrap.innerHTML += '</select></div>' +
        '<div class="modal-actions"><div></div>' +
        '<div class="right"><button class="cancel-btn" id="f-cancel">Cancel</button>' +
        '<button class="primary-btn" id="w-save">Add</button></div></div></div>';
    } else if(m.type === 'availrequest'){
      var today = todayISO();
      var nextWeek = fmtISO(new Date(Date.now()+7*86400000));
      wrap.innerHTML = '<div class="modal">' +
        '<h3>Request Availability</h3>' +
        '<p style="font-size:13px; color:var(--ink-soft); margin:0 0 14px;">Workers will be prompted to mark which days they\'re available in this range.</p>' +
        '<div class="field row2"><div><label>From</label><input type="date" id="ar-from" value="'+m.data.fromDate||today+'"></div>' +
        '<div><label>To</label><input type="date" id="ar-to" value="'+m.data.toDate||nextWeek+'"></div></div>' +
        '<div class="modal-actions"><div></div>' +
        '<div class="right"><button class="cancel-btn" id="f-cancel">Cancel</button>' +
        '<button class="primary-btn" id="ar-save">Send request</button></div></div></div>';
    }

    app.appendChild(wrap);
    wrap.addEventListener('click', function(e){ if(e.target.id==='modal-bg'){ state.modal=null; render(); } });
    var cancel = document.getElementById('f-cancel');
    if(cancel) cancel.onclick = function(){ state.modal=null; render(); };

    var save = document.getElementById('f-save');
    if(save){
      save.onclick = async function(){
        var date = document.getElementById('f-date').value;
        var start = document.getElementById('f-start').value;
        var end = document.getElementById('f-end').value;
        var role = document.getElementById('f-role').value;
        var workerId = document.getElementById('f-worker').value || null;
        var note = document.getElementById('f-note').value.trim();
        if(!date || !start || !end){ showToast('Fill in date, start and end'); return; }
        if(m.data.id){
          await api('PUT','/api/shifts/'+m.data.id, {date:date, start:start, end:end, role:role, workerId:workerId, note:note, status: workerId ? 'assigned' : 'open'});
          var s = state.shifts.find(function(s){ return s.id===m.data.id; });
          Object.assign(s, {date:date, start:start, end:end, role:role, workerId:workerId, note:note, status: workerId ? 'assigned' : 'open'});
        } else {
          var newS = await api('POST','/api/shifts', {date:date, start:start, end:end, role:role, workerId:workerId, note:note});
          state.shifts.push(newS);
        }
        state.modal = null;
        render();
      };
    }
    var del = document.getElementById('f-delete');
    if(del){
      del.onclick = async function(){
        if(!confirm('Delete this shift?')) return;
        await api('DELETE','/api/shifts/'+m.data.id);
        state.shifts = state.shifts.filter(function(s){ return s.id!==m.data.id; });
        state.modal = null;
        render();
      };
    }
    var wsave = document.getElementById('w-save');
    if(wsave){
      wsave.onclick = async function(){
        var name = document.getElementById('w-name').value.trim();
        var role = document.getElementById('w-role').value;
        if(!name){ showToast('Enter a name'); return; }
        var w = await api('POST','/api/workers',{name:name, role:role});
        state.workers.push(w);
        state.modal = null;
        render();
      };
    }
    var arsave = document.getElementById('ar-save');
    if(arsave){
      arsave.onclick = async function(){
        var fromDate = document.getElementById('ar-from').value;
        var toDate = document.getElementById('ar-to').value;
        if(!fromDate || !toDate){ showToast('Select both dates'); return; }
        if(fromDate > toDate){ showToast('Start date must be before end date'); return; }
        var req = await api('POST','/api/availability-requests',{fromDate:fromDate, toDate:toDate});
        state.availabilityRequests.push(req);
        state.modal = null;
        showToast('Availability request sent');
        render();
      };
    }
  }

  // ================= EVENT BINDING =================
  function bindApp(){
    var switchUser = document.getElementById('switch-user');
    if(switchUser) switchUser.onclick = function(){ state.identity=null; localStorage.removeItem('pool_identity'); render(); };

    document.querySelectorAll('[data-tab]').forEach(function(el){
      el.onclick = function(){
        state.tab = el.dataset.tab;
        if(state.tab === 'availability' && !isOperator()) markAvailSeen();
        render();
      };
    });

    var notifBell = document.getElementById('notif-bell');
    if(notifBell) notifBell.onclick = function(){ state.tab = 'availability'; markAvailSeen(); render(); };

    var prev = document.getElementById('wk-prev');
    if(prev) prev.onclick = function(){ var d=new Date(state.weekStart); d.setDate(d.getDate()-7); state.weekStart=d; render(); };
    var next = document.getElementById('wk-next');
    if(next) next.onclick = function(){ var d=new Date(state.weekStart); d.setDate(d.getDate()+7); state.weekStart=d; render(); };
    var todayBtn = document.getElementById('wk-today');
    if(todayBtn) todayBtn.onclick = function(){ state.weekStart = startOfWeek(new Date()); render(); };

    var addGeneric = document.getElementById('add-shift-generic');
    if(addGeneric) addGeneric.onclick = function(){ state.modal = {type:'shift', data:{date: fmtISO(state.weekStart)}}; render(); };

    document.querySelectorAll('[data-add-day]').forEach(function(el){
      el.onclick = function(){ state.modal = {type:'shift', data:{date: el.dataset.addDay}}; render(); };
    });
    document.querySelectorAll('[data-edit]').forEach(function(el){
      el.onclick = function(){ var s = state.shifts.find(function(s){ return s.id===el.dataset.edit; }); state.modal = {type:'shift', data:{}}; Object.assign(state.modal.data, s); render(); };
    });
    document.querySelectorAll('[data-trade]').forEach(function(el){
      el.onclick = async function(){
        await api('PUT','/api/shifts/'+el.dataset.trade, {status:'trade'});
        var s=state.shifts.find(function(s){ return s.id===el.dataset.trade; }); s.status='trade';
        showToast('Put up for trade'); render();
      };
    });
    document.querySelectorAll('[data-untrade]').forEach(function(el){
      el.onclick = async function(){
        await api('PUT','/api/shifts/'+el.dataset.untrade, {status:'assigned'});
        var s=state.shifts.find(function(s){ return s.id===el.dataset.untrade; }); s.status='assigned';
        showToast('Trade cancelled'); render();
      };
    });
    document.querySelectorAll('[data-drop]').forEach(function(el){
      el.onclick = async function(){
        if(!confirm('Drop this shift? It will become unfilled and open for anyone to claim.')) return;
        await api('PUT','/api/shifts/'+el.dataset.drop, {status:'open', workerId:null});
        var s=state.shifts.find(function(s){ return s.id===el.dataset.drop; }); s.status='open'; s.workerId=null;
        showToast('Shift dropped'); render();
      };
    });
    document.querySelectorAll('[data-claim]').forEach(function(el){
      el.onclick = async function(){
        await api('PUT','/api/shifts/'+el.dataset.claim, {status:'assigned', workerId:state.identity.id});
        var s=state.shifts.find(function(s){ return s.id===el.dataset.claim; });
        s.status='assigned'; s.workerId = state.identity.id;
        showToast('Shift claimed \u2014 it is yours now'); render();
      };
    });
    document.querySelectorAll('[data-role-for]').forEach(function(el){
      el.onchange = async function(){
        var w = state.workers.find(function(w){ return w.id===el.dataset.roleFor; });
        await api('PUT','/api/workers/'+w.id, {role:el.value});
        w.role = el.value;
        if(state.identity && state.identity.id===w.id) { state.identity.role = w.role; localStorage.setItem('pool_identity', JSON.stringify(state.identity)); }
        showToast('Role updated'); render();
      };
    });
    document.querySelectorAll('[data-remove-worker]').forEach(function(el){
      el.onclick = async function(){
        if(!confirm('Remove this worker? Their upcoming shifts will become unfilled.')) return;
        await api('DELETE','/api/workers/'+el.dataset.removeWorker);
        state.shifts.forEach(function(s){ if(s.workerId===el.dataset.removeWorker){ s.workerId=null; s.status='open'; } });
        state.workers = state.workers.filter(function(w){ return w.id!==el.dataset.removeWorker; });
        render();
      };
    });
    var addWorker = document.getElementById('add-worker');
    if(addWorker) addWorker.onclick = function(){ state.modal = {type:'addworker', data:{}}; render(); };
    var newAvailReq = document.getElementById('new-avail-request');
    if(newAvailReq) newAvailReq.onclick = function(){ state.modal = {type:'availrequest', data:{}}; render(); };
    var fillAvail = document.getElementById('fill-availability');
    if(fillAvail) fillAvail.onclick = function(){ state.tab = 'availability'; render(); };
    document.querySelectorAll('[data-delete-req]').forEach(function(el){
      el.onclick = async function(){
        if(!confirm('Delete this availability request?')) return;
        await api('DELETE','/api/availability-requests/'+el.dataset.deleteReq);
        state.availabilityRequests = state.availabilityRequests.filter(function(r){ return r.id!==el.dataset.deleteReq; });
        render();
      };
    });
    document.querySelectorAll('[data-avail-toggle]').forEach(function(el){
      el.onclick = async function(){
        var date = el.dataset.availToggle;
        var existing = myAvailForDate(date);
        if(existing){
          if(existing.available){
            await api('PUT','/api/availability/'+existing.id, {available:false});
            existing.available = false;
          } else {
            await api('DELETE','/api/availability/'+existing.id);
            state.availability = state.availability.filter(function(a){ return a.id!==existing.id; });
          }
        } else {
          var newAv = await api('POST','/api/availability',{workerId:state.identity.id, date:date, available:true});
          state.availability.push(newAv);
        }
        render();
      };
    });
    var resetAll = document.getElementById('reset-all');
    if(resetAll) resetAll.onclick = async function(){
      if(!confirm('Are you sure? This will delete ALL workers and shifts permanently.')) return;
      await api('POST','/api/reset');
      state.workers = [];
      state.shifts = [];
      state.identity = null;
      localStorage.removeItem('pool_identity');
      showToast('All data cleared');
      render();
    };
  }

  loadAll();
  setInterval(function(){
    if(state.identity && !state.modal){
      Promise.all([api('GET','/api/workers'), api('GET','/api/shifts'), api('GET','/api/availability-requests'), api('GET','/api/availability')]).then(function(results){
        state.workers = results[0] || [];
        state.shifts = results[1] || [];
        state.availabilityRequests = results[2] || [];
        state.availability = results[3] || [];
        render();
      });
    }
  }, 8000);
})();
</script>
</body>
</html>
